<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laporan - Kasir Web</title>
<link rel="stylesheet" href="css/style.css">
<style>
body { font-family:'Segoe UI',sans-serif; padding:20px; background:#f0f2f5; }
header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
header h2 { margin:0; }
table { width:100%; border-collapse:collapse; background:white; border-radius:10px; overflow:hidden; box-shadow:0 5px 15px rgba(0,0,0,0.1); }
table th, table td { padding:12px; border-bottom:1px solid #ddd; text-align:left; }
table th { background:#3498db; color:white; }
table tr:hover { background:#f1f1f1; }
button { padding:8px 12px; border:none; border-radius:5px; background:#3498db; color:white; cursor:pointer; }
</style>
</head>
<body>

<header>
    <h2>Laporan Transaksi</h2>
    <button onclick="window.location.href='dashboard.html'">⬅️ Dashboard</button>
</header>

<table>
    <thead>
        <tr>
            <th>No</th>
            <th>Tanggal</th>
            <th>Kasir</th>
            <th>Items</th>
            <th>Total</th>
        </tr>
    </thead>
    <tbody id="reportList"></tbody>
</table>
<h3>Total Pendapatan: Rp <span id="totalRevenue">0</span></h3>
<button onclick="printReport()">Cetak Laporan</button>

<script src="js/reports.js"></script>

</body>
</html>
