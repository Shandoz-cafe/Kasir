<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laporan - Shandoz POS</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <h2>📈 Laporan Keuangan</h2>
        <button class="bg-warning btn-head" onclick="window.location.href='dashboard.html'">⬅️ Dashboard</button>
    </header>

    <div class="container">
        
        <div style="background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; margin-bottom: 20px;">
            <h4 style="margin-top: 0; color: #1e293b; margin-bottom: 15px;">Saring Data Laporan:</h4>
            <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px;">
                <button class="bg-primary" style="flex: 1; padding: 12px; color:white;" onclick="filterReports('hari')">Hari Ini</button>
                <button class="bg-primary" style="flex: 1; padding: 12px; color:white;" onclick="filterReports('bulan')">Bulan Ini</button>
                <button class="bg-primary" style="flex: 1; padding: 12px; color:white;" onclick="filterReports('semua')">Semua</button>
            </div>
            <div style="display: flex; gap: 10px;">
                <input type="date" id="customDate" style="flex: 2; margin: 0;">
                <button class="bg-success" style="flex: 1; color:white;" onclick="filterByCustomDate()">Cari Tanggal</button>
            </div>
            <div style="text-align: center; margin-top: 15px; font-weight: bold; color: #3b82f6;">
                Menampilkan Data: <span id="periodeTextUI">Semua Waktu</span>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
            <div style="background: white; padding: 20px; border-radius: 16px; border-left: 5px solid #10b981; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);">
                <div style="font-size: 11px; color: #64748b; font-weight: 600;">TOTAL OMZET</div>
                <div style="font-size: 18px; font-weight: 800; color: #0f172a;" id="reportTotalOmzet">Rp 0</div>
            </div>
            <div style="background: white; padding: 20px; border-radius: 16px; border-left: 5px solid #3b82f6; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);">
                <div style="font-size: 11px; color: #64748b; font-weight: 600;">PRODUK TERJUAL</div>
                <div style="font-size: 18px; font-weight: 800; color: #0f172a;" id="reportTotalQty">0 Pcs</div>
            </div>
        </div>

        <div style="background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; margin-bottom: 20px;">
            <h4 style="margin-top: 0; color: #1e293b;">Grafik Penjualan Harian</h4>
            <div style="position: relative; height: 250px; width: 100%;">
                <canvas id="financeChart"></canvas>
            </div>
        </div>

        <button class="bg-primary" style="width: 100%; padding: 18px; font-size: 16px; margin-bottom: 30px; color:white;" onclick="downloadPDF()">📄 Download PDF Laporan</button>

    </div>

    <script src="auth.js"></script>
    <script>
        checkAuth();
        if(localStorage.getItem('currentRole') !== 'admin') window.location.href = 'dashboard.html';
    </script>
    <script src="reports.js"></script>
</body>
</html>
