<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Buku Keuangan Pintar</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <header>
        <h2>Akuntansi Keuangan</h2>
        <button class="warning" onclick="window.location.href='dashboard.html'">⬅️ Dashboard</button>
    </header>
    <div class="container">
        
        <div class="filter-group card" style="padding: 15px;">
            <strong style="margin-right: 10px;">Filter Laporan:</strong>
            <button class="primary" onclick="filterReports('hari')">Hari Ini</button>
            <button class="primary" onclick="filterReports('bulan')">Bulan Ini</button>
            <button class="primary" onclick="filterReports('tahun')">Tahun Ini</button>
            <button class="warning" onclick="filterReports('semua')">Semua Waktu</button>
            
            <div style="margin-left: auto; display: flex; gap: 10px;">
                <button class="success" onclick="exportLaporan('jpg')">📷 Unduh JPG</button>
                <button class="danger" onclick="exportLaporan('pdf')">📄 Unduh PDF</button>
            </div>
        </div>

        <div class="summary-grid" id="reportArea">
            <div class="summary-card" style="background: #3498db;"><h4>Omzet</h4><h2 id="sumOmzet">Rp 0</h2></div>
            <div class="summary-card" style="background: #f39c12;"><h4>Laba Kotor</h4><h2 id="sumMargin">Rp 0</h2></div>
            <div class="summary-card" style="background: #e74c3c;"><h4>Pengeluaran</h4><h2 id="sumExpense">Rp 0</h2></div>
            <div class="summary-card" style="background: #27ae60;"><h4>Laba Bersih</h4><h2 id="sumNet">Rp 0</h2></div>
        </div>

        <div id="printTableArea" style="background: white; padding: 20px; border-radius: 12px; margin-top: 15px;">
            <h3 style="margin-top:0;">Detail Transaksi (<span id="periodeText">Semua Waktu</span>)</h3>
            <table>
                <thead><tr><th>Tanggal</th><th>Kasir</th><th>Omzet</th><th>Laba</th></tr></thead>
                <tbody id="salesList"></tbody>
            </table>
        </div>
    </div>
    <script src="auth.js"></script>
    <script>checkAuth(); if(localStorage.getItem('currentRole') !== 'admin') window.location.href = 'dashboard.html';</script>
    <script src="reports.js"></script>
</body>
</html>
