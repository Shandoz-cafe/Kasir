<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard - Shandoz POS</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <h2><span style="color:#10b981;">●</span> Sistem Operasi</h2>
        <div style="display: flex; gap: 8px;">
            <button class="bg-warning btn-head" onclick="window.location.href='profiles.html'">👥 Ganti Profil</button>
            <button class="bg-danger btn-head" onclick="logout()">🛑 Keluar</button>
        </div>
    </header>
    
    <div class="container">
        <div style="background: linear-gradient(135deg, #2563eb, #3b82f6); color: white; padding: 25px 20px; border-radius: 16px; margin-bottom: 20px;">
            <h3 style="font-size: 22px; font-weight: 700; margin-bottom: 5px;">Halo, <span id="userNameDisplay">User</span>! 👋</h3>
            <p style="font-size: 12px; opacity: 0.9;">Selamat datang di Shandoz Command Center. Semua fitur telah <b>dibuka penuh</b>.</p>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
            <div style="background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border-left: 5px solid #3b82f6;">
                <div style="font-size: 11px; color: #64748b; font-weight: 600; text-transform: uppercase;">Pendapatan Hari Ini</div>
                <div style="font-size: 20px; font-weight: 800; color: #0f172a;" id="todayIncome">Rp 0</div>
            </div>
            <div style="background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border-left: 5px solid #10b981;">
                <div style="font-size: 11px; color: #64748b; font-weight: 600; text-transform: uppercase;">Total Tiket</div>
                <div style="font-size: 20px; font-weight: 800; color: #0f172a;" id="todayOrders">0</div>
            </div>
        </div>

        <h4 style="margin-bottom: 15px; color: #334155; font-weight: 700;">Aplikasi Utama</h4>
        
        <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 30px;">
            <a href="pos.html" style="background: white; padding: 25px 15px; border-radius: 16px; text-align: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; display: flex; flex-direction: column; align-items: center;">
                <span style="font-size: 35px; margin-bottom: 10px;">🛒</span>
                <span style="font-size: 13px; font-weight: 700; color: #334155;">KASIR (POS)</span>
            </a>
            <a href="product.html" style="background: white; padding: 25px 15px; border-radius: 16px; text-align: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; display: flex; flex-direction: column; align-items: center;">
                <span style="font-size: 35px; margin-bottom: 10px;">📦</span>
                <span style="font-size: 13px; font-weight: 700; color: #334155;">GUDANG / MENU</span>
            </a>
            <a href="reports.html" style="background: white; padding: 25px 15px; border-radius: 16px; text-align: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; display: flex; flex-direction: column; align-items: center;">
                <span style="font-size: 35px; margin-bottom: 10px;">📈</span>
                <span style="font-size: 13px; font-weight: 700; color: #334155;">LAPORAN KEUANGAN</span>
            </a>
            <a href="setting.html" style="background: white; padding: 25px 15px; border-radius: 16px; text-align: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; display: flex; flex-direction: column; align-items: center;">
                <span style="font-size: 35px; margin-bottom: 10px;">⚙️</span>
                <span style="font-size: 13px; font-weight: 700; color: #334155;">PENGATURAN TOKO</span>
            </a>
        </div>
        
        <div style="text-align: center; margin-top: 30px; opacity: 0.5;">
            <h4 style="font-weight: 900; letter-spacing: 2px; color: #0f172a;">SHANDOZ SYSTEMS</h4>
            <p style="font-size: 10px; font-weight: bold;">v4.0 UNLOCKED EDITION</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <script src="auth.js"></script>
    <script>
        checkAuth();
        
        const currentUser = localStorage.getItem('currentUser') || 'User';
        document.getElementById('userNameDisplay').innerText = currentUser.toUpperCase();

        function initDashboardData() {
            const salesData = JSON.parse(localStorage.getItem('sales') || '[]');
            const todayStr = new Date().toLocaleDateString('id-ID');
            let todayIncome = 0; let todayOrders = 0;
            
            salesData.forEach(sale => {
                const saleDate = sale.date.split(',')[0].trim();
                if(saleDate === todayStr) { todayIncome += sale.total; todayOrders++; }
            });

            document.getElementById('todayIncome').innerText = 'Rp ' + todayIncome.toLocaleString('id-ID');
            document.getElementById('todayOrders').innerText = todayOrders;
        }
        
        document.addEventListener('DOMContentLoaded', initDashboardData);
    </script>
</body>
</html>
