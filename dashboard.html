<div class="modal-overlay" id="securityModal">
        <div class="modal-box" style="max-width: 350px; text-align: center;">
            <div class="modal-header"><h3>🔒 Akses Terbatas</h3></div>
            <div class="modal-body">
                <p style="font-size: 13px; margin-bottom: 15px;">Menu ini hanya untuk Owner/Admin. Silakan masukkan PIN Owner:</p>
                <input type="password" id="ownerPinAttempt" placeholder="PIN 4 Digit" maxlength="4" style="text-align: center; font-size: 24px; letter-spacing: 5px;">
                <button class="success" style="width: 100%; margin-bottom: 10px;" onclick="verifyOwnerPin()">Buka Kunci</button>
                <button class="danger" style="width: 100%;" onclick="closeSecurity()">Batal</button>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        checkAuth();
        const currentUser = localStorage.getItem('currentUser') || 'Kasir';
        const currentRole = localStorage.getItem('currentRole') || 'cashier';
        document.getElementById('userNameDisplay').innerText = currentUser.toUpperCase();
        
        // FUNGSI KUNCI PINTU
        let targetUrl = "";
        function checkAccess(url) {
            if(currentRole === 'admin') {
                window.location.href = url; // Admin langsung masuk
            } else {
                targetUrl = url;
                document.getElementById('ownerPinAttempt').value = '';
                document.getElementById('securityModal').style.display = 'flex'; // Kasir dihadang PIN Modal
            }
        }

        function verifyOwnerPin() {
            const attempt = document.getElementById('ownerPinAttempt').value;
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const owner = users.find(u => u.role === 'admin');
            
            if(owner && attempt === owner.pin) {
                window.location.href = targetUrl; // PIN Benar, izinkan masuk
            } else {
                alert("PIN Owner Salah!");
            }
        }

        function closeSecurity() { document.getElementById('securityModal').style.display = 'none'; }
        
        // (Fungsi initDashboardData untuk Grafik sama seperti versi V3 sebelumnya...)
    </script>
