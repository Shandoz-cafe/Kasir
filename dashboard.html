<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h2>KasirKu - <span id="userNameDisplay"></span></h2>
        <button class="danger" onclick="logout()">Logout</button>
    </header>
    <div class="container">
        <h3>Menu Utama</h3>
        <div class="nav-grid">
            <a href="pos.html" class="nav-card">🛒 Mesin Kasir (POS)</a>
            <a href="products.html" class="nav-card">📦 Kelola Produk</a>
            <a href="reports.html" class="nav-card">📊 Laporan Penjualan</a>
            <a href="users.html" class="nav-card" id="menuUsers" style="display:none;">👥 Kelola Pengguna</a>
            <a href="settings.html" class="nav-card" id="menuSettings" style="display:none;">⚙️ Pengaturan Toko</a>
        </div>
    </div>
    <script src="js/auth.js"></script>
    <script>
        checkAuth();
        document.getElementById('userNameDisplay').innerText = localStorage.getItem('currentUser');
        if(localStorage.getItem('currentRole') === 'admin') {
            document.getElementById('menuUsers').style.display = 'block';
            document.getElementById('menuSettings').style.display = 'block';
        }
    </script>
</body>
</html>
