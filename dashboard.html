<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shandoz POS - Dashboard</title>
    <link rel="stylesheet" href="style.css?v=final3">
</head>
<body>
    <header>
        <h2><span style="color:#2ecc71;">●</span> Dashboard - <span id="userNameDisplay"></span></h2>
        <button class="danger" onclick="logout()">🛑 Keluar</button>
    </header>
    
    <div class="container">
        <div class="dash-menu">
            <a href="pos.html" class="menu-card"><span style="font-size: 2.5rem; margin-bottom: 10px;">🛒</span>KASIR (POS)</a>
            <a href="product.html" class="menu-card admin-only" style="display:none;"><span style="font-size: 2.5rem; margin-bottom: 10px;">📦</span>GUDANG</a>
            <a href="reports.html" class="menu-card admin-only" style="display:none;"><span style="font-size: 2.5rem; margin-bottom: 10px;">📊</span>LAPORAN</a>
            <a href="setting.html" class="menu-card admin-only" style="display:none;"><span style="font-size: 2.5rem; margin-bottom: 10px;">⚙️</span>PENGATURAN</a>
        </div>
    </div>
    
    <script src="auth.js"></script>
    <script>
        checkAuth();
        document.getElementById('userNameDisplay').innerText = localStorage.getItem('currentUser');
        if(localStorage.getItem('currentRole') === 'admin') {
            document.querySelectorAll('.admin-only').forEach(el => el.style.display = '');
        }
    </script>
</body>
</html>
