<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kasir Web - Dashboard</title>
<link rel="stylesheet" href="css/style.css">
<style>
body { font-family:'Segoe UI',sans-serif; margin:0; background:#f0f2f5; }
header { background:#3498db; color:white; padding:20px; display:flex; justify-content:space-between; align-items:center; }
header h1 { margin:0; font-size:22px; }
header button { padding:8px 12px; border:none; border-radius:6px; background:#e74c3c; color:white; cursor:pointer; }
nav { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:20px; padding:20px; }
nav a { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; background:white; border-radius:12px; box-shadow:0 5px 15px rgba(0,0,0,0.1); text-decoration:none; color:#2c3e50; font-weight:bold; transition:0.3s; }
nav a:hover { transform:translateY(-5px); box-shadow:0 10px 20px rgba(0,0,0,0.2); }
nav a img { width:40px; margin-bottom:10px; }
</style>
</head>
<body>

<header>
    <h1>Selamat Datang, <span id="currentUserName"></span></h1>
    <button onclick="logout()">Logout</button>
</header>

<nav>
    <a href="pos.html"><img src="assets/logo.png" alt="POS"> POS</a>
    <a href="products.html"><img src="assets/logo.png" alt="Produk"> Produk</a>
    <a href="users.html"><img src="assets/logo.png" alt="Users"> Users</a>
    <a href="reports.html"><img src="assets/logo.png" alt="Laporan"> Laporan</a>
    <a href="settings.html"><img src="assets/logo.png" alt="Settings"> Settings</a>
</nav>

<script>
const currentUser = localStorage.getItem('currentUser');
if(!currentUser){ window.location.href='index.html'; }
document.getElementById('currentUserName').innerText = currentUser;

function logout(){
    localStorage.removeItem('currentUser');
    window.location.href='index.html';
}
</script>

</body>
</html>
