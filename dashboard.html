<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Kasir Web</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<h2>🏠 Dashboard</h2>
<p>Halo, <span id="currentUser"></span>!</p>
<div class="nav-buttons">
    <button onclick="navigate('pos.html')">🛒 POS</button>
    <button onclick="navigate('products.html')">📦 Produk</button>
    <button onclick="navigate('users.html')">👥 Users</button>
    <button onclick="navigate('reports.html')">📊 Laporan</button>
    <button onclick="navigate('settings.html')">⚙️ Settings</button>
    <button onclick="logout()">🚪 Logout</button>
</div>

<script>
document.getElementById('currentUser').innerText = localStorage.getItem('currentUser') || 'Guest';

function navigate(page){
    window.location.href = page;
}
function logout(){
    localStorage.removeItem('currentUser');
    window.location.href = 'index.html';
}
</script>
</body>
</html>
