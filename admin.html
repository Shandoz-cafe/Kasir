<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Produk</title>

<style>
*{box-sizing:border-box;font-family:Segoe UI,Arial;}
body{margin:0;background:#f1f5f9;}
header{
  background:#0f172a;color:#fff;padding:16px 20px;
  display:flex;justify-content:space-between;align-items:center;
}
.container{padding:20px;max-width:1100px;margin:auto;}
.card{
  background:#fff;padding:20px;border-radius:14px;
  box-shadow:0 10px 25px rgba(0,0,0,.08);margin-bottom:20px;
}
.grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:15px;
}
input,select{
  width:100%;padding:10px;border-radius:8px;
  border:1px solid #cbd5e1;margin-bottom:10px;
}
button{
  padding:10px 14px;border:none;border-radius:8px;
  cursor:pointer;font-weight:600;
}
.btn-primary{background:#2563eb;color:#fff;}
.btn-danger{background:#dc2626;color:#fff;}
.btn-edit{background:#f59e0b;color:#fff;margin-right:6px;}
.product-card{
  background:#fff;padding:14px;border-radius:12px;
  box-shadow:0 5px 12px rgba(0,0,0,.08);
}
.small{font-size:13px;color:#64748b;}
.actions{margin-top:8px;}
.top-actions{display:flex;gap:10px;flex-wrap:wrap;}
.logout{background:#334155;color:#fff;}
</style>
</head>
<body>

<header>
  <div><strong>Admin Produk</strong></div>
  <div class="top-actions">
    <button class="logout" onclick="logout()">Logout</button>
  </div>
</header>

<div class="container">

  <div class="card">
    <h3>Tambah / Edit Produk</h3>
    <input type="hidden" id="productId">

    <input type="text" id="name" placeholder="Nama Produk">
    <input type="text" id="category" placeholder="Kategori">
    <input type="number" id="price" placeholder="Harga Jual">
    <input type="number" id="cost" placeholder="Harga Modal">
    <input type="number" id="stock" placeholder="Stok">

    <button class="btn-primary" onclick="saveProduct()">Simpan Produk</button>
  </div>

  <div>
    <h3>Daftar Produk</h3>
    <div class="grid" id="productList"></div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, getDocs,
  updateDoc, deleteDoc, doc, onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import {
  getAuth, onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAXXt6pg-H09RfkgUhnAlZKMsZU8-9oeqw",
  authDomain: "kasir-10280.firebaseapp.com",
  projectId: "kasir-10280",
  storageBucket: "kasir-10280.firebasestorage.app",
  messagingSenderId: "170037480150",
  appId: "1:170037480150:web:45d084d73d9f9834401777"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// CEK LOGIN
onAuthStateChanged(auth, user=>{
  if(!user){
    window.location.href="index.html";
  }
});

// SAVE PRODUCT (ADD / UPDATE)
window.saveProduct = async function(){
  const id = document.getElementById("productId").value;
  const name = document.getElementById("name").value;
  const category = document.getElementById("category").value;
  const price = Number(document.getElementById("price").value);
  const cost = Number(document.getElementById("cost").value);
  const stock = Number(document.getElementById("stock").value);

  if(!name || !price){
    alert("Nama & harga wajib diisi");
    return;
  }

  if(id){
    await updateDoc(doc(db,"products",id),{
      name,category,price,cost,stock
    });
    alert("Produk diupdate");
  }else{
    await addDoc(collection(db,"products"),{
      name,category,price,cost,stock,
      createdAt:new Date()
    });
    alert("Produk ditambahkan");
  }

  clearForm();
};

function clearForm(){
  document.getElementById("productId").value="";
  document.getElementById("name").value="";
  document.getElementById("category").value="";
  document.getElementById("price").value="";
  document.getElementById("cost").value="";
  document.getElementById("stock").value="";
}

// REALTIME LOAD
const productList = document.getElementById("productList");

onSnapshot(collection(db,"products"), snapshot=>{
  productList.innerHTML="";
  snapshot.forEach(docSnap=>{
    const data = docSnap.data();
    const div = document.createElement("div");
    div.className="product-card";
    div.innerHTML=`
      <strong>${data.name}</strong><br>
      <span class="small">${data.category || "-"}</span><br>
      Harga: Rp ${data.price}<br>
      Modal: Rp ${data.cost || 0}<br>
      Stok: ${data.stock || 0}

      <div class="actions">
        <button class="btn-edit" onclick="editProduct('${docSnap.id}','${data.name}','${data.category}','${data.price}','${data.cost}','${data.stock}')">Edit</button>
        <button class="btn-danger" onclick="deleteProduct('${docSnap.id}')">Hapus</button>
      </div>
    `;
    productList.appendChild(div);
  });
});

// EDIT
window.editProduct = function(id,name,category,price,cost,stock){
  document.getElementById("productId").value=id;
  document.getElementById("name").value=name;
  document.getElementById("category").value=category;
  document.getElementById("price").value=price;
  document.getElementById("cost").value=cost;
  document.getElementById("stock").value=stock;
};

// DELETE
window.deleteProduct = async function(id){
  if(confirm("Yakin hapus produk?")){
    await deleteDoc(doc(db,"products",id));
  }
};

// LOGOUT
window.logout = function(){
  signOut(auth).then(()=>{
    window.location.href="index.html";
  });
};
</script>

</body>
</html>
