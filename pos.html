<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kasir - Shandoz</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h2><span style="color:#10b981;">●</span> POS KASIR</h2>
        <div style="display: flex; gap: 8px;">
            <button class="bg-primary btn-head" onclick="showPosHistory()">🕒 Riwayat</button>
            <button class="bg-warning btn-head" onclick="window.location.href='dashboard.html'">⬅️ Dashboard</button>
        </div>
    </header>
    
    <div class="pos-layout">
        <div class="pos-left">
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <input type="text" id="searchInput" placeholder="🔍 Cari menu..." oninput="filterAndSortProducts()" style="margin:0; padding:12px; flex:2;">
                <select id="filterSelect" onchange="filterAndSortProducts()" style="margin:0; padding:12px; flex:1;">
                    <option value="cat-Semua">Semua Kategori</option>
                    <optgroup label="Kategori" id="categoryOptions"></optgroup>
                </select>
            </div>
            <div class="pos-products" id="productsContainer"></div>
        </div>

        <div class="pos-right">
            <div class="cart-list-container" id="cartItems"></div>
            
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <input type="text" id="custName" placeholder="Nama Pelanggan" style="margin: 0; padding: 12px; flex: 1;">
                <select id="payMethod" style="margin: 0; padding: 12px; flex: 1;" onchange="calculateTotal()">
                    <option value="Tunai">Tunai</option><option value="QRIS">QRIS</option>
                </select>
            </div>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <b style="font-size: 14px;">Bayar (Rp):</b>
                <input type="number" id="cashInput" placeholder="0" oninput="calculateTotal()" style="width: 150px; margin: 0; padding: 10px; text-align: right; font-weight: bold; color: #10b981; font-size: 18px;">
            </div>
            
            <div style="text-align: right; margin-bottom: 10px; font-weight: bold; color: #334155;">
                Kembali: <span id="changeDisplay" style="font-size: 20px;">Rp 0</span>
            </div>
            
            <button class="btn-charge" onclick="previewCheckout()" style="border:none;">
                <span>BAYAR</span><span id="grandTotalDisplay">Rp 0</span>
            </button>
        </div>
    </div>

    <div class="modal-overlay" id="previewModal">
        <div class="modal-box">
            <div class="modal-header"><h3 id="previewTitle">Konfirmasi Pembayaran</h3></div>
            <div class="modal-body" style="background: #f1f5f9; display: flex; justify-content: center;">
                <div id="receiptPreviewContent" style="box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);"></div>
            </div>
            <div style="padding: 15px; display: flex; gap: 10px; border-top: 1px solid #e2e8f0;">
                <button class="bg-danger" style="flex: 1; padding: 15px;" onclick="closePreview()">Batal</button>
                <button class="bg-success" style="flex: 2; padding: 15px; font-size: 16px;" onclick="confirmAndPrint()">🖨️ Cetak Struk</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="historyModal">
        <div class="modal-box" style="max-width: 500px;">
            <div class="modal-header"><h3>Riwayat Transaksi Terakhir</h3></div>
            <div class="modal-body" style="padding: 0;">
                <table style="width: 100%; border-collapse: collapse; font-size: 13px;">
                    <thead style="background: #f8fafc;"><tr><th style="padding:15px; text-align:left;">Info</th><th style="padding:15px; text-align:right;">Total</th><th style="padding:15px; text-align:center;">Cetak</th></tr></thead>
                    <tbody id="posHistoryList"></tbody>
                </table>
            </div>
            <div style="padding: 15px; border-top: 1px solid #e2e8f0;">
                <button class="bg-danger" style="width: 100%; padding: 15px;" onclick="closePosHistory()">Tutup</button>
            </div>
        </div>
    </div>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script src="auth.js"></script>
    
    <script>checkAuth();</script> 
    
    <script src="pos.js"></script>
</body>
</html>
