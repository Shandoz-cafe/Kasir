<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS - Kasir Web</title>
<link rel="stylesheet" href="css/style.css">
<style>
body { font-family:'Segoe UI',sans-serif; margin:0; background:#f0f2f5; }
header { background:#3498db; color:white; padding:15px; display:flex; justify-content:space-between; align-items:center; }
main { padding:20px; display:flex; flex-wrap:wrap; gap:20px; }
.product-card { background:white; padding:15px; border-radius:12px; width:150px; box-shadow:0 5px 15px rgba(0,0,0,0.1); text-align:center; cursor:pointer; }
.product-card:hover { transform:translateY(-3px); }
.cart { background:white; padding:15px; border-radius:12px; flex:1; min-width:250px; box-shadow:0 5px 15px rgba(0,0,0,0.1); }
.cart h3 { margin-top:0; }
.cart-item { display:flex; justify-content:space-between; margin-bottom:8px; }
button { padding:5px 8px; border:none; border-radius:5px; cursor:pointer; background:#3498db; color:white; }
</style>
</head>
<body>

<header>
    <h2>POS - Kasir Web</h2>
    <button onclick="window.location.href='dashboard.html'">⬅️ Dashboard</button>
</header>

<main>
    <div id="productsContainer"></div>

    <div class="cart">
        <h3>Keranjang</h3>
        <div id="cartItems"></div>
        <strong>Total: Rp <span id="cartTotal">0</span></strong><br><br>
        <button onclick="checkout()">Checkout</button>
    </div>
</main>

<script src="js/pos.js"></script>
<script src="js/products.js"></script>
<script>
const currentUser = localStorage.getItem('currentUser');
if(!currentUser){ window.location.href='index.html'; }
</script>

</body>
</html>
