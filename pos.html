<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kasir Pro Offline - POS</title>
<link rel="stylesheet" href="css/style.css">
<script src="js/pos_offline.js" defer></script>
</head>
<body>
<h2>💰 POS Offline</h2>
<a href="admin.html">Admin Produk</a>

<div>
    <label>Produk:</label>
    <input type="text" id="saleProduct" placeholder="Nama Produk">
    <label>Jumlah:</label>
    <input type="number" id="saleQty" value="1" min="1">
    <button onclick="addToCart()">➕ Tambah Item</button>
</div>

<div id="cartList" style="margin-top:20px;"></div>
<div>
    Total: <span id="cartTotal">Rp 0</span>
    <button onclick="checkout()">✅ Bayar & Print</button>
    <button onclick="clearCart()">🗑️ Kosongkan</button>
</div>
</body>
</html>
