<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesin Kasir</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="pos-body">
    <header>
        <h2>Terminal Kasir - SHANDOZ</h2>
        <button class="warning" onclick="window.location.href='dashboard.html'" style="padding: 8px 15px; font-size: 0.9rem;">⬅️ Kembali</button>
    </header>
    
    <div class="pos-container">
        <div class="pos-left">
            <div class="filter-bar">
                <input type="text" id="searchInput" placeholder="🔍 Cari nama menu..." oninput="filterAndSortProducts()">
                <select id="filterSelect" onchange="filterAndSortProducts()">
                    <optgroup label="Urutkan Abjad">
                        <option value="sort-AZ">Abjad A - Z</option>
                        <option value="sort-ZA">Abjad Z - A</option>
                    </optgroup>
                    <optgroup label="Filter Kategori" id="categoryOptions">
                        </optgroup>
                </select>
            </div>
            
            <div class="product-grid" id="productsContainer"></div>
        </div>

        <div class="pos-right">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; padding-bottom:10px; border-bottom:2px solid #eee;">
                <h3 style="margin:0;">🛒 Pesanan</h3>
                <div>
                    <button class="warning" style="padding: 6px 12px; font-size:0.85rem;" onclick="saveOpenBill()">⏸️ Hold Tiket</button>
                    <button class="primary" style="padding: 6px 12px; font-size:0.85rem;" onclick="showOpenBills()">📋 Buka Tiket</button>
                </div>
            </div>

            
            <div class="cart-scroll" id="cartItems"></div>
            
            <div class="payment-section">
                <div class="payment-row">
                    <span>Pelanggan:</span>
                    <input type="text" id="custName" placeholder="Nama..." style="width: 140px; padding:6px 10px; font-size:0.85rem; margin:0; border-radius:6px;">
                </div>
                <div class="payment-row">
                    <span>Bayar via:</span>
                    <select id="payMethod" style="width: 140px; padding:6px 10px; font-size:0.85rem; margin:0; border-radius:6px;" onchange="handlePaymentMethod()">
                        <option value="Tunai">💵 Tunai</option>
                        <option value="QRIS">📱 QRIS</option>
                        <option value="Debit">💳 Debit</option>
                    </select>
                </div>
                <div class="payment-row" style="margin-top:5px; border-top:1px solid #eee; padding-top:5px;">
                    <span>Subtotal:</span><span id="subtotalDisplay">Rp 0</span>
                </div>
                <div class="payment-row">
                    <span>Diskon (%):</span>
                    <input type="number" id="discountInput" value="0" min="0" max="100" style="width: 70px; padding:6px; text-align:center; margin:0; border-radius:6px;" oninput="calculateTotal()">
                </div>
                <div class="payment-row payment-total">
                    <span>TOTAL:</span><span id="grandTotalDisplay">Rp 0</span>
                </div>

                <div style="margin-top: 10px;">
                    <input type="number" id="cashInput" placeholder="Uang Tunai (Rp)" style="font-size: 1.2rem; font-weight: bold; color: #27ae60; padding: 12px; text-align:center; margin:0; border-radius:8px; width:100%; box-sizing:border-box;" oninput="calculateTotal()">
                    <div class="payment-row" style="font-size: 1.1rem; color: #2a5298; font-weight: bold; margin-top: 5px;">
                        <span>Kembali:</span><span id="changeDisplay">Rp 0</span>
                    </div>
                </div>
                
                <button class="success" style="width: 100%; padding: 15px; font-size: 1.1rem; margin-top: 10px; border-radius:8px;" onclick="previewCheckout()">👀 Preview & Bayar</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="previewModal">
        <div class="modal-box">
            <h3 style="margin-top: 0; color: #1e3c72;">Pratinjau Struk</h3>
            <div class="receipt-preview" id="receiptPreviewContent"></div>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button class="danger" style="flex: 1;" onclick="closePreview()">Batal</button>
                <button class="primary" style="flex: 2; font-size: 1.1rem;" onclick="confirmAndPrint()">🖨️ Cetak (RawBT)</button>
            </div>
        </div>
    </div>

    <script src="auth.js"></script><script>checkAuth();</script><script src="pos.js"></script>
</body>
</html>
