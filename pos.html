<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kasir Pro - POS</title>
<link rel="stylesheet" href="css/style.css">
<script type="module" src="js/firebase.js"></script>
<script type="module" src="js/pos.js"></script>
</head>
<body>
<h1>💰 Kasir Pro POS</h1>
<div id="todayStats">
    <p>Penjualan Hari Ini: <span id="todayRevenue">Rp 0</span></p>
    <p>Transaksi: <span id="todayCount">0</span></p>
</div>

<div id="posInterface">
    <div>
        <input type="text" id="saleProduct" placeholder="Scan barcode atau ketik nama">
        <input type="number" id="saleQty" value="1" min="1">
        <button onclick="addToCart()">➕ Tambah Item</button>
    </div>
    <div id="cartList"></div>
    <div>
        Total: <span id="cartTotal">Rp 0</span>
        <button onclick="checkout()">✅ Bayar & Print</button>
        <button onclick="clearCart()">🗑️ Kosongkan</button>
    </div>
</div>

<div id="receiptPreview" style="display:none;"></div>
</body>
</html>
