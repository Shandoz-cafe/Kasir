<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kasir - Shandoz</title>
    <link rel="stylesheet" href="style.css?v=final3">
</head>
<body>
    <header>
        <h2><span style="color:#2ecc71;">●</span> POS</h2>
        <div style="display: flex; gap: 8px;">
            <button class="primary" onclick="showPosHistory()">🕒 Riwayat</button>
            <button class="warning" onclick="window.location.href='dashboard.html'">⬅️ Menu</button>
        </div>
    </header>
    
    <div class="pos-layout">
        <div class="pos-left">
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <input type="text" id="searchInput" placeholder="🔍 Cari menu..." oninput="filterAndSortProducts()" style="margin:0; padding:12px; flex:2;">
                <select id="filterSelect" onchange="filterAndSortProducts()" style="margin:0; padding:12px; flex:1;">
                    <option value="cat-Semua">Semua</option>
                    <optgroup label="Kategori" id="categoryOptions"></optgroup>
                </select>
            </div>
            <div class="pos-products" id="productsContainer"></div>
        </div>

        <div class="pos-right">
            <div class="cart-list-container" id="cartItems"></div>
            
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <input type="text" id="custName" placeholder="Nama Pelanggan" style="margin: 0; padding: 12px; flex: 1;">
                <select id="payMethod" style="margin: 0; padding: 12px; flex: 1;" onchange="calculateTotal()">
                    <option value="Tunai">Tunai</option><option value="QRIS">QRIS</option>
                </select>
            </div>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <b>Tunai:</b>
                <input type="number" id="cashInput" placeholder="0" oninput="calculateTotal()" style="width: 150px; margin: 0; padding: 10px; text-align: right; font-weight: bold; color: #2ecc71;">
            </div>
            
            <div style="text-align: right; margin-bottom: 10px; font-weight: bold;">
                Kembali: <span id="changeDisplay" style="font-size: 18px;">Rp 0</span>
            </div>
            
            <button class="btn-charge" onclick="previewCheckout()">
                <span>BAYAR</span><span id="grandTotalDisplay">Rp 0</span>
            </button>
        </div>
    </div>

    <div class="modal-overlay" id="previewModal">
        <div class="modal-box">
            <div class="modal-header"><h3 id="previewTitle">Konfirmasi Struk</h3></div>
            <div class="modal-body" style="background: #eaeff3; display: flex; justify-content: center;">
                <div id="receiptPreviewContent" style="box-shadow: 0 4px 10px rgba(0,0,0,0.2);"></div>
            </div>
            <div style="padding: 15px; display: flex; gap: 10px; border-top: 1px solid #eee;">
                <button class="danger" style="flex: 1; padding: 15px;" onclick="closePreview()">Batal</button>
                <button class="success" style="flex: 2; padding: 15px; font-size: 16px;" onclick="confirmAndPrint()">🖨️ Cetak</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="historyModal">
        <div class="modal-box" style="max-width: 500px;">
            <div class="modal-header"><h3>Riwayat Transaksi Terakhir</h3></div>
            <div class="modal-body" style="padding: 0;">
                <table style="width: 100%; border-collapse: collapse; font-size: 13px;">
                    <thead style="background: #f4f6f8;"><tr><th style="padding:15px; text-align:left;">Waktu</th><th style="padding:15px; text-align:right;">Total</th><th style="padding:15px; text-align:center;">Aksi</th></tr></thead>
                    <tbody id="posHistoryList"></tbody>
                </table>
            </div>
            <div style="padding: 15px; border-top: 1px solid #eee;">
                <button class="danger" style="width: 100%; padding: 15px;" onclick="closePosHistory()">Tutup</button>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="pos.js"></script>
</body>
</html>
