<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pilih Akun - VIREXON</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background: #0f172a; color: #fff; font-family: 'Poppins', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        h1 { margin-bottom: 20px; font-weight: 600; letter-spacing: 1px; text-align: center; font-size: 20px;}
        
        .profile-container { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; max-width: 600px; padding: 10px; max-height: 50vh; overflow-y: auto;}
        .profile-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 16px; text-align: center; width: 120px; cursor: pointer; border: 2px solid transparent; transition: 0.3s; }
        .profile-card:active { border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); transform: scale(0.95); }
        .avatar { font-size: 40px; margin-bottom: 8px; }
        .name { font-size: 13px; font-weight: 600; }
        .role-badge { font-size: 10px; background: #3b82f6; padding: 3px 8px; border-radius: 10px; margin-top: 5px; display: inline-block;}
        .role-cashier { background: #10b981; }

        /* Modal PIN Super Ringkas Anti Kelelep */
        .pin-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.95); z-index: 100; justify-content: center; align-items: center; flex-direction: column; backdrop-filter: blur(5px);}
        .pin-display { font-size: 30px; letter-spacing: 15px; margin-bottom: 15px; height: 35px; color: #3b82f6; font-weight: bold;}
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 250px; margin: 0 auto;}
        .numpad button { width: 65px; height: 65px; border-radius: 50%; border: none; background: rgba(255,255,255,0.1); color: white; font-size: 22px; cursor: pointer; transition: 0.2s; font-weight: 600;}
        .numpad button:active { background: rgba(255,255,255,0.3); transform: scale(0.9); }
        .btn-cancel { margin-top: 15px; color: #ef4444; cursor: pointer; font-size: 13px; font-weight: 600; padding: 10px 20px;}
    </style>
</head>
<body>

    <h1>Siapa yang bertugas?</h1>
    <div class="profile-container" id="profileList"></div>

    <div class="pin-modal" id="pinModal">
        <h2 id="pinTitle" style="margin-bottom: 5px; text-align: center; font-size: 18px;">Masukkan PIN</h2>
        <p id="pinSubtitle" style="color: #94a3b8; font-size: 12px; margin-bottom: 15px; text-align: center;">4 Angka Rahasia.</p>
        
        <div id="pinPadArea" style="display: flex; flex-direction: column; align-items: center;">
            <div class="pin-display" id="pinDisplay">_ _ _ _</div>
            <div class="numpad">
                <button onclick="pressPin(1)">1</button><button onclick="pressPin(2)">2</button><button onclick="pressPin(3)">3</button>
                <button onclick="pressPin(4)">4</button><button onclick="pressPin(5)">5</button><button onclick="pressPin(6)">6</button>
                <button onclick="pressPin(7)">7</button><button onclick="pressPin(8)">8</button><button onclick="pressPin(9)">9</button>
                <button style="opacity:0; pointer-events:none;">.</button>
                <button onclick="pressPin(0)">0</button>
                <button onclick="pressPin('C')" style="background: rgba(239,68,68,0.2); color: #ef4444;">C</button>
            </div>
        </div>

        <div class="btn-cancel" onclick="closePinModal()">Batal</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="auth.js"></script>
    <script>
        checkAuth(); 

        let activeProfile = null;
        let typedPin = "";
        let autoSetupTriggered = false; // Kunci biar ga nge-loop nodongnya

        function renderProfiles() {
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            if(users.length === 0) return; // Nunggu sedotan data dari awan turun

            let html = users.map(u => `
                <div class="profile-card" onclick="openPinModal('${u.id}')">
                    <div class="avatar">${u.role === 'admin' ? '👑' : '🧑‍🍳'}</div>
                    <div class="name">${u.name}</div>
                    <div class="role-badge ${u.role === 'cashier' ? 'role-cashier' : ''}">${u.role.toUpperCase()}</div>
                </div>
            `).join('');

            document.getElementById('profileList').innerHTML = html;

            // JURUS TODONG INSTAN: Kalau akun baru bikin, langsung paksa isi PIN!
            if (users.length === 1 && users[0].pin === "SETUP" && !autoSetupTriggered) {
                autoSetupTriggered = true;
                openPinModal(users[0].id);
            }
        }

        function openPinModal(userId) {
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            activeProfile = users.find(u => u.id === userId);
            typedPin = "";
            updatePinDisplay();
            
            document.getElementById('pinPadArea').style.display = 'flex';

            if (activeProfile.pin === "SETUP") {
                document.getElementById('pinTitle').innerText = "Buat PIN Keamanan";
                document.getElementById('pinSubtitle').innerText = "Amankan kasir Anda dengan 4 angka.";
                document.getElementById('pinTitle').style.color = "#10b981";
            } else {
                document.getElementById('pinTitle').innerText = "PIN " + activeProfile.name;
                document.getElementById('pinSubtitle').innerText = "Masukkan 4 digit PIN Anda.";
                document.getElementById('pinTitle').style.color = "#fff";
            }
            
            document.getElementById('pinModal').style.display = 'flex';
        }

        function closePinModal() {
            document.getElementById('pinModal').style.display = 'none';
        }

        function pressPin(num) {
            if(num === 'C') { typedPin = ""; } 
            else if(typedPin.length < 4) { typedPin += num; }
            updatePinDisplay();

            // AUTO SUBMIT SETELAH 4 ANGKA DIMASUKKAN
            if(typedPin.length === 4) {
                setTimeout(() => submitPin(), 200); 
            }
        }

        function updatePinDisplay() {
            let display = "";
            for(let i=0; i<4; i++) { display += i < typedPin.length ? "● " : "_ "; }
            document.getElementById('pinDisplay').innerText = display;
        }

        function submitPin() {
            if(typedPin.length !== 4) return;

            // PROSES SIMPAN PIN PERTAMA KALI
            if (activeProfile.pin === "SETUP") {
                const users = JSON.parse(localStorage.getItem('users') || '[]');
                const idx = users.findIndex(u => u.id === activeProfile.id);
                users[idx].pin = typedPin; 
                localStorage.setItem('users', JSON.stringify(users)); // Otomatis terlempar ke Firebase berkat mesin auth.js
                localStorage.setItem('currentUser', activeProfile.name);
                localStorage.setItem('currentRole', activeProfile.role);
                window.location.replace('dashboard.html');
                return;
            }

            // PROSES COCOKKAN PIN JIKA SUDAH PUNYA
            if(typedPin === activeProfile.pin) {
                localStorage.setItem('currentUser', activeProfile.name);
                localStorage.setItem('currentRole', activeProfile.role);
                window.location.replace('dashboard.html');
            } else {
                alert("PIN Salah! Coba lagi."); 
                typedPin = ""; 
                updatePinDisplay();
            }
        }

        document.addEventListener('DOMContentLoaded', renderProfiles);
    </script>
</body>
</html>
