<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pilih Akun - Shandoz POS</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background: #0f172a; color: #fff; font-family: 'Poppins', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        h1 { margin-bottom: 30px; font-weight: 600; letter-spacing: 1px; text-align: center; font-size: 22px;}
        
        .profile-container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; max-width: 600px; padding: 20px; }
        .profile-card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 16px; text-align: center; width: 140px; cursor: pointer; border: 2px solid transparent; transition: 0.3s; }
        .profile-card:hover, .profile-card:active { border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); transform: translateY(-5px); }
        .avatar { font-size: 50px; margin-bottom: 10px; }
        .name { font-size: 14px; font-weight: 600; }
        .role-badge { font-size: 10px; background: #3b82f6; padding: 3px 8px; border-radius: 10px; margin-top: 5px; display: inline-block;}
        .role-cashier { background: #10b981; }

        .add-btn { border: 2px dashed #475569; background: transparent; }
        .add-btn:hover { border-color: #10b981; background: rgba(16, 185, 129, 0.1); }

        /* Modal PIN */
        .pin-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.95); z-index: 100; justify-content: center; align-items: center; flex-direction: column; backdrop-filter: blur(5px);}
        .pin-display { font-size: 35px; letter-spacing: 15px; margin-bottom: 30px; height: 40px; color: #3b82f6; font-weight: bold;}
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .numpad button { width: 75px; height: 75px; border-radius: 50%; border: none; background: rgba(255,255,255,0.1); color: white; font-size: 24px; cursor: pointer; transition: 0.2s; font-weight: 600;}
        .numpad button:active { background: rgba(255,255,255,0.3); transform: scale(0.9); }
        .btn-cancel { margin-top: 30px; color: #ef4444; cursor: pointer; font-size: 14px; font-weight: 600; padding: 10px 20px;}
        
        /* Input Add Kasir */
        .kasir-input { width: 100%; max-width: 250px; padding: 15px; margin-bottom: 15px; border-radius: 10px; border: none; font-size: 16px; text-align: center; background: rgba(255,255,255,0.1); color: white; outline: none;}
        .kasir-input::placeholder { color: #94a3b8; }
        .kasir-input:focus { background: rgba(255,255,255,0.2); box-shadow: 0 0 0 2px #10b981; }
    </style>
</head>
<body>

    <h1>Siapa yang sedang bertugas?</h1>
    <div class="profile-container" id="profileList">
        </div>

    <div class="pin-modal" id="pinModal">
        <h2 id="pinTitle" style="margin-bottom: 5px; text-align: center;">Masukkan PIN</h2>
        <p id="pinSubtitle" style="color: #94a3b8; font-size: 13px; margin-bottom: 20px; text-align: center;">Masukkan 4 digit angka rahasia.</p>
        
        <div id="pinPadArea" style="display: flex; flex-direction: column; align-items: center;">
            <div class="pin-display" id="pinDisplay">_ _ _ _</div>
            <div class="numpad">
                <button onclick="pressPin(1)">1</button><button onclick="pressPin(2)">2</button><button onclick="pressPin(3)">3</button>
                <button onclick="pressPin(4)">4</button><button onclick="pressPin(5)">5</button><button onclick="pressPin(6)">6</button>
                <button onclick="pressPin(7)">7</button><button onclick="pressPin(8)">8</button><button onclick="pressPin(9)">9</button>
                <button onclick="pressPin('C')" style="background: rgba(239,68,68,0.2); color: #ef4444;">C</button>
                <button onclick="pressPin(0)">0</button>
                <button onclick="submitPin()" style="background: #3b82f6; color: white;">OK</button>
            </div>
        </div>

        <div id="formAddKasir" style="display: none; flex-direction: column; align-items: center; width: 100%;">
            <input type="text" id="newKasirName" class="kasir-input" placeholder="Nama Kasir (Cth: Budi)">
            <input type="number" id="newKasirPin" class="kasir-input" placeholder="Buat PIN (4 Angka)" maxlength="4" pattern="\d*">
            <button onclick="saveNewKasir()" style="width: 100%; max-width: 250px; padding: 15px; background: #10b981; color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer;">Simpan Kasir Baru</button>
        </div>

        <div class="btn-cancel" onclick="closePinModal()">Tutup / Batal</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="auth.js"></script>
    <script>
        checkAuth(); 

        let activeProfile = null;
        let typedPin = "";
        let pinMode = "login"; // Bisa 'login' atau 'add_kasir'

        function renderProfiles() {
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            let html = users.map(u => `
                <div class="profile-card" onclick="openPinModal('${u.id}', 'login')">
                    <div class="avatar">${u.role === 'admin' ? '👑' : '🧑‍🍳'}</div>
                    <div class="name">${u.name}</div>
                    <div class="role-badge ${u.role === 'cashier' ? 'role-cashier' : ''}">${u.role.toUpperCase()}</div>
                </div>
            `).join('');

            // TAMBAHKAN TOMBOL BIKIN KASIR DI LAYAR DEPAN
            html += `
                <div class="profile-card add-btn" onclick="openPinModal('admin', 'add_kasir')">
                    <div class="avatar" style="opacity:0.7;">➕</div>
                    <div class="name" style="color:#94a3b8; margin-top:5px;">Tambah Kasir</div>
                </div>
            `;
            document.getElementById('profileList').innerHTML = html;
        }

        function openPinModal(userId, mode) {
            pinMode = mode;
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            typedPin = "";
            updatePinDisplay();
            document.getElementById('formAddKasir').style.display = 'none';
            document.getElementById('pinPadArea').style.display = 'flex';

            if (mode === 'add_kasir') {
                activeProfile = users.find(u => u.role === 'admin');
                if(activeProfile.pin === "SETUP") return alert("Silakan klik profil Owner dulu untuk membuat PIN awal!");
                
                document.getElementById('pinTitle').innerText = "Otorisasi Owner";
                document.getElementById('pinSubtitle').innerText = "Masukkan PIN Owner untuk hak akses menambah kasir.";
                document.getElementById('pinTitle').style.color = "#10b981";
            } else {
                activeProfile = users.find(u => u.id === userId);
                if (activeProfile.pin === "SETUP") {
                    document.getElementById('pinTitle').innerText = "Buat PIN Baru Owner";
                    document.getElementById('pinSubtitle').innerText = "Amankan sistem Anda dengan 4 angka rahasia.";
                    document.getElementById('pinTitle').style.color = "#10b981";
                } else {
                    document.getElementById('pinTitle').innerText = "PIN " + activeProfile.name;
                    document.getElementById('pinSubtitle').innerText = "Masukkan 4 digit PIN Anda.";
                    document.getElementById('pinTitle').style.color = "#fff";
                }
            }
            
            document.getElementById('pinModal').style.display = 'flex';
        }

        function closePinModal() {
            document.getElementById('pinModal').style.display = 'none';
        }

        function pressPin(num) {
            if(num === 'C') { typedPin = ""; } 
            else if(typedPin.length < 4) { typedPin += num; }
            updatePinDisplay();
        }

        function updatePinDisplay() {
            let display = "";
            for(let i=0; i<4; i++) { display += i < typedPin.length ? "● " : "_ "; }
            document.getElementById('pinDisplay').innerText = display;
        }

        function submitPin() {
            if(typedPin.length !== 4) return alert("Perhatian! PIN wajib 4 angka.");

            // JIKA MAU NAMBAH KASIR
            if (pinMode === 'add_kasir') {
                if (typedPin === activeProfile.pin) {
                    // PIN Owner Benar -> Buka Form Tambah Kasir
                    document.getElementById('pinPadArea').style.display = 'none';
                    document.getElementById('pinTitle').innerText = "Buat Profil Kasir";
                    document.getElementById('pinSubtitle').innerText = "Masukkan nama dan PIN untuk kasir baru.";
                    document.getElementById('pinTitle').style.color = "#3b82f6";
                    document.getElementById('formAddKasir').style.display = 'flex';
                } else {
                    alert("PIN Owner Salah! Tidak diizinkan menambah kasir.");
                    typedPin = ""; updatePinDisplay();
                }
                return;
            }

            // JIKA BIKIN PIN OWNER PERTAMA KALI
            if (activeProfile.pin === "SETUP") {
                const users = JSON.parse(localStorage.getItem('users') || '[]');
                const idx = users.findIndex(u => u.id === activeProfile.id);
                users[idx].pin = typedPin; 
                localStorage.setItem('users', JSON.stringify(users)); 

                localStorage.setItem('currentUser', activeProfile.name);
                localStorage.setItem('currentRole', activeProfile.role);
                window.location.href = 'dashboard.html';
                return;
            }

            // JIKA LOGIN BIASA
            if(typedPin === activeProfile.pin) {
                localStorage.setItem('currentUser', activeProfile.name);
                localStorage.setItem('currentRole', activeProfile.role);
                window.location.href = 'dashboard.html';
            } else {
                alert("Ups! PIN yang kamu masukkan salah.");
                typedPin = ""; updatePinDisplay();
            }
        }

        function saveNewKasir() {
            const name = document.getElementById('newKasirName').value;
            const pin = document.getElementById('newKasirPin').value;
            if(!name || pin.length !== 4) return alert("Nama wajib diisi dan PIN wajib 4 angka!");

            const users = JSON.parse(localStorage.getItem('users') || '[]');
            users.push({ id: 'kasir_'+Date.now(), name: name, role: 'cashier', pin: pin });
            localStorage.setItem('users', JSON.stringify(users));

            alert("SUKSES! Kasir baru berhasil ditambahkan.");
            closePinModal();
            renderProfiles();
        }
    </script>
</body>
</html>
