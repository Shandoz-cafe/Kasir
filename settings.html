<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings - Kasir Web</title>
<link rel="stylesheet" href="css/style.css">
<style>
body { font-family:'Segoe UI',sans-serif; padding:20px; background:#f0f2f5; }
header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
header h2 { margin:0; }
input, button { padding:8px; margin-bottom:10px; border-radius:5px; border:1px solid #ccc; }
button { border:none; background:#3498db; color:white; cursor:pointer; }
img { max-width:150px; margin-top:10px; display:block; }
</style>
</head>
<body>

<header>
    <h2>Settings</h2>
    <button onclick="window.location.href='dashboard.html'">⬅️ Dashboard</button>
</header>

<div>
    <label>Nama Toko:</label><br>
    <input type="text" id="storeName"><br>

    <label>Logo Toko:</label><br>
    <input type="file" onchange="uploadLogo(event)"><br>
    <img id="logoPreview" src="" alt="Logo Toko"><br>

    <button onclick="saveSettingChanges()">Simpan Settings</button>
</div>

<script src="js/settings.js"></script>

</body>
</html>
