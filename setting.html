<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pengaturan - Shandoz POS</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h2>⚙️ Pengaturan Sistem</h2>
        <button class="bg-warning btn-head" onclick="window.location.href='dashboard.html'">⬅️ Kembali</button>
    </header>

    <div class="container">
        <div style="background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; margin-bottom: 20px;">
            <h3 style="margin-top: 0; margin-bottom: 20px; color: #3b82f6; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px;">👥 Manajemen Pengguna</h3>
            <div id="usersList" style="margin-bottom: 20px;"></div>

            <div style="background: #f0f8ff; padding: 15px; border-radius: 12px; border: 1px dashed #3b82f6; margin-bottom: 20px;">
                <h4 style="margin-bottom: 10px; color: #1e3a8a;">+ Tambah Profil Kasir</h4>
                <input type="text" id="newKasirName" placeholder="Nama Kasir (Contoh: Budi)">
                <input type="number" id="newKasirPin" placeholder="Buat PIN Kasir (4 Angka)" maxlength="4" pattern="\d*">
                <button class="bg-primary" style="width:100%; padding:15px; color:white; font-size:15px;" onclick="addKasir()">Simpan Kasir Baru</button>
            </div>

            <div style="background: #fff5f5; padding: 15px; border-radius: 12px; border: 1px dashed #ef4444;">
                <h4 style="margin-bottom: 10px; color: #991b1b;">🔑 Ubah PIN Owner</h4>
                <input type="number" id="newOwnerPin" placeholder="Masukkan PIN Owner Baru" maxlength="4" pattern="\d*">
                <button class="bg-danger" style="width:100%; padding:15px; color:white; font-size:15px;" onclick="changeOwnerPin()">Update PIN Owner</button>
            </div>
        </div>

        <div style="background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; margin-bottom: 20px;">
            <h3 style="margin-top: 0; margin-bottom: 20px; color: #10b981; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px;">🏢 Profil Toko & Struk</h3>
            
            <label>Nama Cafe / Toko:</label>
            <input type="text" id="storeNameInput" placeholder="Contoh: SHANDOZ CAFE">
            
            <label>Gambar Logo Struk:</label>
            <input type="file" id="storeLogoInput" accept="image/*" style="padding: 10px;">
            <div id="logoPreview" style="max-height: 80px; margin-bottom: 15px;"></div>

            <label>Lebar Kertas Printer:</label>
            <select id="paperSizeInput">
                <option value="58">Kertas Kecil (Thermal 58mm)</option>
                <option value="80">Kertas Besar (Thermal 80mm)</option>
            </select>

            <button class="bg-success" onclick="saveStoreSettings()" style="width: 100%; padding: 18px; font-size: 16px; color:white;">💾 SIMPAN PENGATURAN</button>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        checkAuth();
        let currentLogoBase64 = null;

        window.onload = function() {
            document.getElementById('storeNameInput').value = localStorage.getItem('storeName') || '';
            currentLogoBase64 = localStorage.getItem('storeLogo');
            if(currentLogoBase64) {
                document.getElementById('logoPreview').innerHTML = `<img src="${currentLogoBase64}" style="max-height:80px;">`;
            }
            const ps = JSON.parse(localStorage.getItem('printerSettings') || '{"paperSize":"58", "autoPrint":true}');
            document.getElementById('paperSizeInput').value = ps.paperSize;
            renderUserList();
        }

        function renderUserList() {
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            document.getElementById('usersList').innerHTML = users.map((u, i) => `
                <div style="display:flex; justify-content:space-between; align-items:center; background:#f8fafc; border:1px solid #e2e8f0; padding:15px; margin-bottom:10px; border-radius:12px;">
                    <div>
                        <b style="font-size:16px;">${u.name}</b> <span style="font-size:10px; background:${u.role === 'admin' ? '#3b82f6' : '#10b981'}; color:white; padding:3px 8px; border-radius:10px; margin-left:5px;">${u.role.toUpperCase()}</span><br>
                        <small style="color:#64748b;">PIN: <b>${u.pin}</b></small>
                    </div>
                    ${u.role !== 'admin' ? `<button class="bg-danger" style="padding:8px 12px; font-size:12px; color:white;" onclick="deleteUser(${i})">Hapus</button>` : `<span style="font-size:24px;">👑</span>`}
                </div>
            `).join('');
        }

        function addKasir() {
            const name = document.getElementById('newKasirName').value;
            const pin = document.getElementById('newKasirPin').value;
            if(!name || pin.length !== 4) return alert("Gagal");
            
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            users.push({ id: 'kasir_'+Date.now(), name: name, role: 'cashier', pin: pin });
            localStorage.setItem('users', JSON.stringify(users)); 
            
            document.getElementById('newKasirName').value = '';
            document.getElementById('newKasirPin').value = '';
            renderUserList();
            alert("Sukses");
        }

        function changeOwnerPin() {
            const newPin = document.getElementById('newOwnerPin').value;
            if(newPin.length !== 4) return alert("Gagal");
            
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const ownerIndex = users.findIndex(u => u.role === 'admin'); 
            
            if(ownerIndex !== -1) {
                users[ownerIndex].pin = newPin; 
                localStorage.setItem('users', JSON.stringify(users)); 
                alert("Sukses");
                document.getElementById('newOwnerPin').value = '';
                renderUserList();
            }
        }

        function deleteUser(index) {
            if(confirm("Hapus?")) {
                const users = JSON.parse(localStorage.getItem('users') || '[]');
                users.splice(index, 1);
                localStorage.setItem('users', JSON.stringify(users));
                renderUserList();
            }
        }

        // MESIN KOMPRESOR LOGO OTOMATIS BIAR BISA DI-SAVE
        document.getElementById('storeLogoInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 300; // Perkecil ukuran gambar ke 300px
                        let width = img.width;
                        let height = img.height;
                        
                        if (width > MAX_WIDTH) {
                            height = Math.round((height * MAX_WIDTH) / width);
                            width = MAX_WIDTH;
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        // Kompres jadi JPEG biar sangat ringan di memori
                        currentLogoBase64 = canvas.toDataURL('image/jpeg', 0.8); 
                        document.getElementById('logoPreview').innerHTML = `<img src="${currentLogoBase64}" style="max-height:80px;">`;
                    };
                    img.src = event.target.result;
                }
                reader.readAsDataURL(file);
            }
        });

        function saveStoreSettings() {
            localStorage.setItem('storeName', document.getElementById('storeNameInput').value);
            if (currentLogoBase64) {
                try {
                    localStorage.setItem('storeLogo', currentLogoBase64); 
                } catch(e) {
                    return alert("Gagal");
                }
            }
            const pSettings = { paperSize: document.getElementById('paperSizeInput').value, autoPrint: true };
            localStorage.setItem('printerSettings', JSON.stringify(pSettings));
            alert('Sukses');
        }
    </script>
</body>
</html>
