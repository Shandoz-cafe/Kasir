<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Pengaturan Toko</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h2>Pengaturan & Cetak</h2>
        <button class="warning" onclick="window.location.href='dashboard.html'">⬅️ Kembali</button>
    </header>
    <div class="container">
        <div class="card" style="max-width: 400px;">
            <label><strong>Nama Cafe / Toko (Tampil di Struk)</strong></label>
            <input type="text" id="storeNameInput" style="margin-top: 10px; margin-bottom: 20px;">
            
            <label><strong>Desain Logo Struk</strong></label>
            <br><small style="color: #7f8c8d;">Pilih gambar logo eksklusifmu di sini. Pastikan kontrasnya cukup tinggi.</small>
            <input type="file" id="logoInput" accept="image/*" style="margin-top: 10px;" onchange="previewLogo(event)">
            
            <div style="margin-top: 10px; text-align: center;">
                <img id="logoPreview" src="" alt="Preview Logo" style="max-width: 80px; display: none; border-radius: 8px; border: 1px solid #ddd; padding: 5px;">
            </div>
            
            <button class="primary" onclick="saveSettings()" style="margin-top: 20px; width: 100%;">Simpan Perubahan</button>
        </div>
    </div>
    <script src="js/auth.js"></script>
    <script>
        checkAuth();
        if(localStorage.getItem('currentRole') !== 'admin') window.location.href = 'dashboard.html';
    </script>
    <script src="js/settings.js"></script>
</body>
</html>
