<div class="card admin-only">
    <h3>⚙️ Pengaturan Printer Thermal</h3>
    <div style="display: flex; flex-direction: column; gap: 10px;">
        <div>
            <label>Model Printer:</label>
            <select id="printerModel">
                <option value="default">Model Lainnya</option>
                <option value="epson">Epson</option>
                <option value="star">Star</option>
            </select>
        </div>
        <div>
            <label>Antarmuka (Interface):</label>
            <select id="printerInterface">
                <option value="bluetooth">Bluetooth</option>
                <option value="ethernet">Ethernet / IP</option>
            </select>
        </div>
        <div>
            <label>Alamat IP / Nama Bluetooth:</label>
            <input type="text" id="printerAddress" placeholder="Contoh: 192.168.1.100">
        </div>
        <div>
            <label>Lebar Kertas:</label>
            <select id="paperSize">
                <option value="58">58 mm</option>
                <option value="80">80 mm</option>
            </select>
        </div>
        <div style="display: flex; align-items: center; gap: 10px; margin-top: 5px;">
            <input type="checkbox" id="autoPrint" style="width: 20px;">
            <span>Print struk secara otomatis</span>
        </div>
        <button class="success" onclick="savePrinterSettings()" style="margin-top: 10px;">💾 Simpan Pengaturan Printer</button>
    </div>
</div>

<script>
// Fungsi Simpan
function savePrinterSettings() {
    const printerSettings = {
        model: document.getElementById('printerModel').value,
        interface: document.getElementById('printerInterface').value,
        address: document.getElementById('printerAddress').value,
        paperSize: document.getElementById('paperSize').value,
        autoPrint: document.getElementById('autoPrint').checked
    };
    localStorage.setItem('printerSettings', JSON.stringify(printerSettings));
    alert('Pengaturan Printer Berhasil Disimpan!');
}

// Fungsi Muat Data Saat Halaman Dibuka
window.onload = function() {
    const saved = JSON.parse(localStorage.getItem('printerSettings') || '{}');
    if(saved.model) {
        document.getElementById('printerModel').value = saved.model;
        document.getElementById('printerInterface').value = saved.interface;
        document.getElementById('printerAddress').value = saved.address;
        document.getElementById('paperSize').value = saved.paperSize;
        document.getElementById('autoPrint').checked = saved.autoPrint;
    }
}
</script>
