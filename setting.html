<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pengaturan - VIREXON</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){ emailjs.init("pgslV2rXk3tukFEMk"); })();
    </script>

    <style>
        .setting-group { background: white; padding: 20px; border-radius: 16px; margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .setting-title { font-size: 16px; font-weight: 700; color: #0f172a; margin-bottom: 15px; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; }
        .setting-item { margin-bottom: 15px; }
        .setting-item label { display: block; font-size: 12px; color: #64748b; font-weight: 600; margin-bottom: 5px; }
        .setting-item input, .setting-item select { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-family: 'Poppins', sans-serif; outline: none; }
        .setting-item input:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.2); }
        .btn-action { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; color: white; margin-top: 5px; transition: 0.2s; }
        .btn-action:active { transform: scale(0.95); }
    </style>
</head>
<body class="pos-body" style="background: #f8fafc;">

    <div id="loader">Memproses Data...</div>

    <header style="background: #334155;">
        <h2 data-i18n="set_title">⚙️ Pengaturan Sistem</h2>
        <button class="bg-warning btn-head" onclick="window.location.href='dashboard.html'" data-i18n="set_back">⬅️ Dashboard</button>
    </header>

    <div class="container" style="max-width: 600px; margin: 0 auto; padding-top: 20px;">
        
        <div class="setting-group">
            <div class="setting-title" data-i18n="set_store">🏪 Profil Usaha & Printer</div>
            
            <div class="setting-item">
                <label id="lbl_logo">Logo Kafe (Akan dicetak di Struk)</label>
                <input type="file" id="setStoreLogo" accept="image/png, image/jpeg, image/webp" style="padding: 8px; font-size: 11px;">
                
                <div style="margin-top: 10px; text-align: center; background: #f1f5f9; padding: 10px; border-radius: 8px;">
                    <img id="logoPreview" src="" alt="Preview Logo" style="max-height: 80px; max-width: 100%; object-fit: contain; display: none;">
                    <p id="noLogoText" style="font-size: 11px; color: #94a3b8; margin: 0;">Belum ada logo terpasang</p>
                </div>
                <button class="bg-danger" id="btnHapusLogo" style="display:none; width:100%; margin-top:8px; font-size:12px; padding:8px; border:none; border-radius:8px; color:white; cursor:pointer;" onclick="hapusLogo()">🗑️ Hapus Logo</button>
            </div>

            <div class="setting-item">
                <label data-i18n="set_store_name">Nama Kafe / Toko (Tampil di Struk)</label>
                <input type="text" id="setStoreName" placeholder="Contoh: VIREXON CAFE">
            </div>
            
            <div class="setting-item">
                <label data-i18n="set_print_size">Ukuran Kertas Printer Bluetooth</label>
                <select id="setPrinterSize">
                    <option value="58" id="opt_58">Ukuran Kecil (58mm)</option>
                    <option value="80" id="opt_80">Ukuran Besar (80mm)</option>
                </select>
            </div>
            <button class="btn-action" style="background: #10b981;" onclick="saveStoreSettings()" data-i18n="set_btn_store">💾 Simpan Pengaturan Toko</button>
        </div>

        <div class="setting-group" style="border-left: 5px solid #8b5cf6;">
            <div class="setting-title" data-i18n="set_lang_title">🌐 Bahasa / Language</div>
            <div class="setting-item">
                <label data-i18n="set_lang_label">Pilih Bahasa Aplikasi</label>
                <select id="setLanguageDropdown" onchange="previewLanguage()">
                    <option value="id">🇮🇩 Bahasa Indonesia</option>
                    <option value="en">🇬🇧 English</option>
                </select>
            </div>
            <button class="btn-action" style="background: #8b5cf6;" onclick="saveLanguage()" data-i18n="set_btn_lang">💾 Simpan Bahasa</button>
        </div>

        <div class="setting-group" style="border-left: 5px solid #ef4444;">
            <div class="setting-title" style="color: #ef4444;" data-i18n="set_sec_title">🛡️ Pusat Keamanan Owner</div>
            
            <div style="background: #fff1f2; padding: 15px; border-radius: 8px; border: 1px dashed #fecdd3; margin-bottom: 15px;">
                <p style="font-size: 12px; color: #be123c; margin-bottom: 10px; font-weight: 500;" data-i18n="set_sec_desc1">Perubahan PIN akan dilindungi oleh kode OTP yang dikirim otomatis ke Email Anda.</p>
                <button class="btn-action" style="background: #e11d48;" onclick="requestPinChangeWithOTP()" data-i18n="set_btn_pin">🔑 Ganti PIN Kasir Owner</button>
            </div>

            <div style="background: #f0f9ff; padding: 15px; border-radius: 8px; border: 1px dashed #bae6fd;">
                <p style="font-size: 12px; color: #0369a1; margin-bottom: 10px; font-weight: 500;" data-i18n="set_sec_desc2">Lupa atau ingin mengganti kata sandi login Google Anda?</p>
                <button class="btn-action" style="background: #0ea5e9;" onclick="requestPasswordReset()" data-i18n="set_btn_pass">📧 Kirim Link Ganti Password</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="auth.js"></script>
    <script src="lang.js"></script>

    <script>
        checkAuth(); 

        let currentLogoBase64 = localStorage.getItem('storeLogo') || "";

        function updateJSUI() {
            const lang = localStorage.getItem('appLang') || 'id';
            document.getElementById('lbl_logo').innerText = lang === 'en' ? 'Store Logo (Printed on Receipt)' : 'Logo Kafe (Akan dicetak di Struk)';
            document.getElementById('noLogoText').innerText = lang === 'en' ? 'No logo uploaded' : 'Belum ada logo terpasang';
            document.getElementById('btnHapusLogo').innerText = lang === 'en' ? '🗑️ Delete Logo' : '🗑️ Hapus Logo';
            document.getElementById('opt_58').innerText = lang === 'en' ? 'Small Size (58mm)' : 'Ukuran Kecil (58mm)';
            document.getElementById('opt_80').innerText = lang === 'en' ? 'Large Size (80mm)' : 'Ukuran Besar (80mm)';
            
            let loaderText = lang === 'en' ? 'Processing Data...' : 'Memproses Data...';
            document.getElementById('loader').innerText = loaderText;
        }

        function previewLanguage() {
            const tempLang = document.getElementById('setLanguageDropdown').value;
            // Hanya preview, belum di save beneran
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Load Nama & Kertas
            document.getElementById('setStoreName').value = localStorage.getItem('storeName') || "VIREXON";
            const printerConfig = JSON.parse(localStorage.getItem('printerSettings') || '{"paperSize":"58"}');
            document.getElementById('setPrinterSize').value = printerConfig.paperSize;
            document.getElementById('setLanguageDropdown').value = localStorage.getItem('appLang') || 'id';

            updateJSUI(); // Translate teks khusus JS

            // Load Logo Preview
            if (currentLogoBase64) {
                document.getElementById('logoPreview').src = currentLogoBase64;
                document.getElementById('logoPreview').style.display = 'inline-block';
                document.getElementById('noLogoText').style.display = 'none';
                document.getElementById('btnHapusLogo').style.display = 'inline-block';
            }

            // File Reader untuk Upload Logo
            document.getElementById('setStoreLogo').addEventListener('change', function(e) {
                const lang = localStorage.getItem('appLang') || 'id';
                const file = e.target.files[0];
                if (!file) return;
                
                if (file.size > 300 * 1024) {
                    let msg = lang === 'en' ? "Image too large! Maximum 300KB to prevent cloud overload." : "Ukuran gambar terlalu besar! Maksimal 300KB agar cloud tidak berat.";
                    let title = lang === 'en' ? "Size Warning" : "Peringatan Ukuran";
                    customAlert(msg, title, "⚠️");
                    this.value = "";
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(event) {
                    currentLogoBase64 = event.target.result;
                    document.getElementById('logoPreview').src = currentLogoBase64;
                    document.getElementById('logoPreview').style.display = 'inline-block';
                    document.getElementById('noLogoText').style.display = 'none';
                    document.getElementById('btnHapusLogo').style.display = 'inline-block';
                };
                reader.readAsDataURL(file);
            });
        });

        // HAPUS LOGO PAKE CUSTOM CONFIRM MODERN
        function hapusLogo() {
            const lang = localStorage.getItem('appLang') || 'id';
            let msg = lang === 'en' ? "Are you sure you want to remove this logo from your receipts?" : "Yakin ingin menghapus logo ini dari struk cetak Anda?";
            let title = lang === 'en' ? "Delete Logo" : "Hapus Logo";

            customConfirm(msg, () => {
                currentLogoBase64 = "";
                document.getElementById('setStoreLogo').value = "";
                document.getElementById('logoPreview').src = "";
                document.getElementById('logoPreview').style.display = 'none';
                document.getElementById('noLogoText').style.display = 'block';
                document.getElementById('btnHapusLogo').style.display = 'none';
            }, title, "🗑️");
        }

        // SIMPAN SETTING PAKE CUSTOM ALERT
        function saveStoreSettings() {
            const lang = localStorage.getItem('appLang') || 'id';
            const role = localStorage.getItem('currentRole');
            
            if(role !== 'admin') {
                let msg = lang === 'en' ? "Access Denied! Only Owner can change this." : "Akses ditolak! Hanya Owner yang bisa mengubah ini.";
                let title = lang === 'en' ? "Restricted Access" : "Akses Terbatas";
                return customAlert(msg, title, "⛔");
            }
            
            const newName = document.getElementById('setStoreName').value.trim();
            const newSize = document.getElementById('setPrinterSize').value;
            
            if(newName) localStorage.setItem('storeName', newName);
            localStorage.setItem('printerSettings', JSON.stringify({ paperSize: newSize, autoPrint: true }));
            localStorage.setItem('storeLogo', currentLogoBase64);
            
            let msgS = lang === 'en' ? "Store profile and printer settings successfully saved to system." : "Pengaturan profil toko dan printer berhasil disimpan ke sistem.";
            let titleS = lang === 'en' ? "Success" : "Sukses";
            customAlert(msgS, titleS, "✅");
        }

        function saveLanguage() {
            const newLang = document.getElementById('setLanguageDropdown').value;
            setLanguage(newLang); // Dari lang.js
            updateJSUI(); // Update teks JS di halaman ini
            
            if(newLang === 'en') customAlert("Language updated successfully!", "Success", "✅");
            else customAlert("Bahasa aplikasi berhasil diperbarui!", "Sukses", "✅");
        }

        // ALUR GANTI PIN PAKE CUSTOM PROMPT BERUNTUN
        let generatedOTP = "";
        function requestPinChangeWithOTP() {
            const lang = localStorage.getItem('appLang') || 'id';
            const role = localStorage.getItem('currentRole');
            
            if(role !== 'admin') {
                let msg = lang === 'en' ? "Access Denied! This feature is for Owner only." : "Akses ditolak! Fitur ini khusus Owner.";
                let title = lang === 'en' ? "Security" : "Keamanan";
                return customAlert(msg, title, "⛔");
            }

            const currentUser = auth.currentUser;
            
            if (currentUser && currentUser.email) {
                prosesKirimEmailOTP(currentUser.email, lang);
            } else {
                let promptMsg = lang === 'en' ? "Enter your registered Email address:" : "Masukkan alamat Email Anda yang terdaftar:";
                let promptTitle = lang === 'en' ? "Identity Verification" : "Verifikasi Identitas";

                customPrompt(promptMsg, (inputEmail) => {
                    if(inputEmail) prosesKirimEmailOTP(inputEmail.trim(), lang);
                }, promptTitle, "📧", "email");
            }
        }

        function prosesKirimEmailOTP(emailTarget, lang) {
            generatedOTP = Math.floor(1000 + Math.random() * 9000).toString();
            showLoader(true);

            emailjs.send("service_s4n2kxr", "template_c6f0gjr", {
                email: emailTarget, otp_code: generatedOTP
            }).then(function() {
                showLoader(false);
                
                // Minta OTP
                let otpMsg = lang === 'en' 
                    ? `OTP SENT! 🔒<br>Please check your inbox at:<br><b style="color:#3b82f6;">${emailTarget}</b><br><br>Enter the 4-digit OTP code:`
                    : `OTP TERKIRIM! 🔒<br>Silakan cek pesan masuk di email:<br><b style="color:#3b82f6;">${emailTarget}</b><br><br>Masukkan 4 Angka kode OTP:`;
                let otpTitle = lang === 'en' ? "Email OTP Verification" : "Verifikasi OTP Email";

                customPrompt(otpMsg, (inputOTP) => {
                    
                    if (inputOTP === generatedOTP) {
                        // Jika OTP Benar, minta PIN Baru
                        let newPinMsg = lang === 'en' ? "CORRECT OTP! ✅<br><br>Please create your NEW 4-digit PIN:" : "OTP BENAR! ✅<br><br>Silakan buat 4 digit PIN BARU Anda:";
                        let newPinTitle = lang === 'en' ? "Create New PIN" : "Buat PIN Baru";

                        customPrompt(newPinMsg, (newPin) => {
                            if (newPin && newPin.length === 4 && !isNaN(newPin)) {
                                simpanPinOwnerBaru(newPin, lang);
                            } else {
                                let failMsg = lang === 'en' ? "Failed to save. PIN must be exactly 4 digits!" : "Gagal menyimpan. PIN wajib terdiri dari 4 angka!";
                                let failTitle = lang === 'en' ? "Wrong Format" : "Format Salah";
                                customAlert(failMsg, failTitle, "❌");
                            }
                        }, newPinTitle, "🔑", "password");
                    } else {
                        let wrongOtpMsg = lang === 'en' ? "The OTP code you entered is WRONG!" : "Kode OTP yang Anda masukkan SALAH!";
                        let wrongOtpTitle = lang === 'en' ? "Verification Failed" : "Gagal Verifikasi";
                        customAlert(wrongOtpMsg, wrongOtpTitle, "❌");
                    }
                    
                }, otpTitle, "📨", "number");

            }, function(error) { 
                showLoader(false); 
                let errMsg = lang === 'en' ? "Failed to send OTP email. Make sure internet connection is active." : "Gagal mengirim email OTP. Pastikan koneksi internet aktif.";
                let errTitle = lang === 'en' ? "Server Error" : "Error Server";
                customAlert(errMsg, errTitle, "📡"); 
            });
        }

        function simpanPinOwnerBaru(newPin, lang) {
            let users = JSON.parse(localStorage.getItem('users') || '[]');
            let ownerIndex = users.findIndex(u => u.role === 'admin');
            if(ownerIndex > -1) {
                users[ownerIndex].pin = newPin;
                localStorage.setItem('users', JSON.stringify(users)); 
                
                let successMsg = lang === 'en' ? "Hooray! Owner Security PIN has been changed. Please remember your PIN well." : "Hore! PIN Keamanan Owner berhasil diganti. Harap ingat PIN Anda baik-baik.";
                let successTitle = lang === 'en' ? "PIN Updated" : "PIN Diperbarui";
                customAlert(successMsg, successTitle, "🎉");
            }
        }
    </script>
</body>
</html>
