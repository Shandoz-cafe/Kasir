<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Pengaturan Toko</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h2>Setup Identitas Toko</h2>
        <button class="warning" onclick="window.location.href='dashboard.html'">⬅️ Dashboard</button>
    </header>
    <div class="container">
        <div class="card" style="max-width: 450px; margin: auto;">
            <label><strong>Nama Tercetak di Struk</strong></label>
            <input type="text" id="storeNameInput" style="margin-top: 10px; margin-bottom: 20px;" placeholder="SHANDOZ Cafe">
            
            <label><strong>Logo Struk Thermal</strong></label>
            <br><small style="color: #7f8c8d;">Pilih file desain logo hitam-putih milikmu (Opsional).</small>
            <input type="file" id="logoInput" accept="image/*" style="margin-top: 10px;" onchange="previewLogo(event)">
            
            <div style="margin-top: 10px; text-align: center; background: #f8fafc; padding: 10px; border-radius: 8px;">
                <img id="logoPreview" src="" alt="Preview" style="max-width: 80px; display: none; filter: grayscale(100%); mix-blend-mode: multiply;">
            </div>
            
            <button class="primary" onclick="saveSettings()" style="margin-top: 20px; width: 100%;">💾 Simpan Pengaturan</button>
        </div>
    </div>
    <script src="auth.js"></script><script>checkAuth(); if(localStorage.getItem('currentRole') !== 'admin') window.location.href = 'dashboard.html';</script><script src="setting.js"></script>
</body>
</html>
