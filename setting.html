<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pengaturan - Shandoz POS</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){
          emailjs.init("pgslV2rXk3tukFEMk"); // PUBLIC KEY BOS
       })();
    </script>

    <style>
        .setting-group { background: white; padding: 20px; border-radius: 16px; margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .setting-title { font-size: 16px; font-weight: 700; color: #0f172a; margin-bottom: 15px; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; }
        .setting-item { margin-bottom: 15px; }
        .setting-item label { display: block; font-size: 12px; color: #64748b; font-weight: 600; margin-bottom: 5px; }
        .setting-item input, .setting-item select { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-family: 'Poppins', sans-serif; outline: none; }
        .setting-item input:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.2); }
        .btn-action { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; color: white; margin-top: 5px; }
    </style>
</head>
<body class="pos-body" style="background: #f8fafc;">

    <div id="loader">Memproses Data...</div>

    <header style="background: #334155;">
        <h2>⚙️ Pengaturan Sistem</h2>
        <button class="bg-warning btn-head" onclick="window.location.href='dashboard.html'">⬅️ Dashboard</button>
    </header>

    <div class="container" style="max-width: 600px; margin: 0 auto; padding-top: 20px;">
        
        <div class="setting-group">
            <div class="setting-title">🏪 Profil Usaha & Printer</div>
            <div class="setting-item">
                <label>Nama Kafe / Toko (Tampil di Struk)</label>
                <input type="text" id="setStoreName" placeholder="Contoh: SHANDOZ CAFE">
            </div>
            <div class="setting-item">
                <label>Ukuran Kertas Printer Bluetooth</label>
                <select id="setPrinterSize">
                    <option value="58">Ukuran Kecil (58mm)</option>
                    <option value="80">Ukuran Besar (80mm)</option>
                </select>
            </div>
            <button class="btn-action" style="background: #10b981;" onclick="saveStoreSettings()">💾 Simpan Pengaturan Toko</button>
        </div>

        <div class="setting-group" style="border-left: 5px solid #ef4444;">
            <div class="setting-title" style="color: #ef4444;">🛡️ Pusat Keamanan Owner</div>
            
            <div style="background: #fff1f2; padding: 15px; border-radius: 8px; border: 1px dashed #fecdd3; margin-bottom: 15px;">
                <p style="font-size: 12px; color: #be123c; margin-bottom: 10px; font-weight: 500;">Perubahan PIN akan dilindungi oleh kode OTP yang dikirim otomatis ke Email Anda.</p>
                <button class="btn-action" style="background: #e11d48;" onclick="requestPinChangeWithOTP()">🔑 Ganti PIN Kasir Owner</button>
            </div>

            <div style="background: #f0f9ff; padding: 15px; border-radius: 8px; border: 1px dashed #bae6fd;">
                <p style="font-size: 12px; color: #0369a1; margin-bottom: 10px; font-weight: 500;">Lupa atau ingin mengganti kata sandi login Google Anda?</p>
                <button class="btn-action" style="background: #0ea5e9;" onclick="requestPasswordReset()">📧 Kirim Link Ganti Password</button>
            </div>
        </div>

    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="auth.js"></script>

    <script>
        checkAuth(); // Pastikan tidak ada penyusup masuk ke halaman setting

        // 1. FUNGSI LOAD DATA AWAL
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('setStoreName').value = localStorage.getItem('storeName') || "SHANDOZ CAFE";
            const printerConfig = JSON.parse(localStorage.getItem('printerSettings') || '{"paperSize":"58"}');
            document.getElementById('setPrinterSize').value = printerConfig.paperSize;
        });

        // 2. FUNGSI SIMPAN INFO TOKO
        function saveStoreSettings() {
            const role = localStorage.getItem('currentRole');
            if(role !== 'admin') return alert("Hanya Owner yang berhak merubah info toko!");

            const newName = document.getElementById('setStoreName').value.trim();
            const newSize = document.getElementById('setPrinterSize').value;
            
            if(newName) localStorage.setItem('storeName', newName);
            localStorage.setItem('printerSettings', JSON.stringify({ paperSize: newSize, autoPrint: true }));
            
            alert("✅ Pengaturan toko berhasil disimpan!");
        }

        // 3. MESIN CANGGIH GANTI PIN DENGAN VERIFIKASI OTP EMAILJS
        let generatedOTP = "";

        function requestPinChangeWithOTP() {
            const role = localStorage.getItem('currentRole');
            if(role !== 'admin') return alert("❌ Akses Ditolak! Hanya Owner yang berhak mengganti PIN Utama.");

            const currentUser = auth.currentUser;
            let emailTarget = currentUser ? currentUser.email : prompt("Masukkan Email Anda untuk menerima kode OTP:");
            
            if(!emailTarget) return;

            // Bikin 4 Angka OTP Acak (Contoh: 4921)
            generatedOTP = Math.floor(1000 + Math.random() * 9000).toString();

            showLoader(true);

            // MENGIRIM SURAT LEWAT MESIN EMAILJS
            emailjs.send("service_s4n2kxr", "template_bkbzv39", {
                email: emailTarget,
                otp_code: generatedOTP
            }).then(function(response) {
                showLoader(false);
                
                // Minta Bos masukin OTP yang masuk ke Email
                let inputOTP = prompt(`🔒 KODE OTP TERKIRIM!\nSilakan cek kotak masuk atau folder spam email: ${emailTarget}\n\nMasukkan 4 Digit Kode OTP di bawah ini:`);
                
                if (inputOTP === generatedOTP) {
                    // JIKA OTP BENAR, SURUH MASUKIN PIN BARU
                    let newPin = prompt("✅ VERIFIKASI BERHASIL!\n\nSilakan buat 4 digit PIN BARU Anda:");
                    if (newPin && newPin.length === 4 && !isNaN(newPin)) {
                        simpanPinOwnerBaru(newPin);
                    } else {
                        alert("❌ Gagal. PIN wajib berisi 4 angka!");
                    }
                } else {
                    alert("❌ KODE OTP SALAH ATAU KADALUARSA!");
                }

            }, function(error) {
                showLoader(false);
                alert("❌ Gagal mengirim email OTP. Pastikan koneksi internet stabil.\nDetail: " + JSON.stringify(error));
            });
        }

        // 4. FUNGSI PENYIMPANAN PIN BARU KE FIREBASE
        function simpanPinOwnerBaru(newPin) {
            let users = JSON.parse(localStorage.getItem('users') || '[]');
            let ownerIndex = users.findIndex(u => u.role === 'admin');
            
            if(ownerIndex > -1) {
                users[ownerIndex].pin = newPin;
                localStorage.setItem('users', JSON.stringify(users)); // Otomatis kesedot Firebase via auth.js
                alert("🎉 PIN Kemananan Owner berhasil diganti!");
            } else {
                alert("Data Owner tidak ditemukan di sistem.");
            }
        }
    </script>
</body>
</html>
