        <div class="card">
            <h3 style="margin-bottom: 20px; color: #10b981; border-bottom: 2px solid #eee; padding-bottom: 10px;">👥 Manajemen Akun (Owner & Kasir)</h3>
            
            <div id="usersList" style="margin-bottom: 20px;">
                </div>

            <div style="background: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px dashed #ccc;">
                <h4 style="margin-bottom: 10px;">Tambah Akun Kasir Baru</h4>
                <input type="text" id="newKasirName" placeholder="Nama Kasir (Contoh: Budi)">
                <input type="number" id="newKasirPin" placeholder="Buat PIN Kasir (4 Angka)" maxlength="4">
                <button class="primary" style="width:100%;" onclick="addKasir()">+ Tambah Kasir</button>
            </div>
        </div>

<script>
    function renderUserList() {
        const users = JSON.parse(localStorage.getItem('users') || '[]');
        document.getElementById('usersList').innerHTML = users.map((u, i) => `
            <div style="display:flex; justify-content:space-between; align-items:center; background:#fff; border:1px solid #ddd; padding:10px; margin-bottom:10px; border-radius:6px;">
                <div>
                    <b>${u.name}</b> <span style="font-size:10px; background:#e0e0e0; padding:2px 5px; border-radius:4px;">${u.role.toUpperCase()}</span><br>
                    <small>PIN: ${u.pin}</small>
                </div>
                ${u.role !== 'admin' ? `<button class="danger" style="padding:5px 10px; font-size:12px;" onclick="deleteUser(${i})">Hapus</button>` : `<small style="color:#2196f3;">(Akun Utama)</small>`}
            </div>
        `).join('');
    }

    function addKasir() {
        const name = document.getElementById('newKasirName').value;
        const pin = document.getElementById('newKasirPin').value;
        if(!name || pin.length !== 4) return alert("Nama harus diisi & PIN wajib 4 angka!");
        
        const users = JSON.parse(localStorage.getItem('users') || '[]');
        users.push({ id: 'kasir_'+Date.now(), name: name, role: 'cashier', pin: pin });
        localStorage.setItem('users', JSON.stringify(users)); // Otomatis tersinkron ke Firebase
        
        document.getElementById('newKasirName').value = '';
        document.getElementById('newKasirPin').value = '';
        renderUserList();
    }

    function deleteUser(index) {
        if(confirm("Hapus akun kasir ini?")) {
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            users.splice(index, 1);
            localStorage.setItem('users', JSON.stringify(users));
            renderUserList();
        }
    }
</script>
