<div class="card admin-only">
    <h3>🏢 Pengaturan Toko & Printer</h3>
    <div style="display: flex; flex-direction: column; gap: 15px;">
        <div>
            <label style="display:block; font-weight:bold; margin-bottom:5px;">Link Logo Struk (URL):</label>
            <input type="text" id="storeLogoInput" placeholder="https://link-gambar-logo.png" style="padding:12px; font-size:16px;">
        </div>
        
        <div>
            <label style="display:block; font-weight:bold; margin-bottom:5px;">Nama Toko:</label>
            <input type="text" id="storeNameInput" style="padding:12px; font-size:16px;">
        </div>

        <div style="border-top: 1px solid #eee; padding-top: 10px;">
            <label style="display:block; font-weight:bold; margin-bottom:5px;">Ukuran Kertas:</label>
            <select id="paperSizeInput" style="padding:12px; font-size:16px;">
                <option value="58">Thermal 58mm (Kecil)</option>
                <option value="80">Thermal 80mm (Besar)</option>
            </select>
        </div>

        <button class="success" onclick="saveAllSettings()" style="padding:15px; font-size:18px;">💾 SIMPAN SEMUA PENGATURAN</button>
    </div>
</div>

<script>
function saveAllSettings() {
    localStorage.setItem('storeLogo', document.getElementById('storeLogoInput').value);
    localStorage.setItem('storeName', document.getElementById('storeNameInput').value);
    const pSettings = {
        paperSize: document.getElementById('paperSizeInput').value,
        autoPrint: true
    };
    localStorage.setItem('printerSettings', JSON.stringify(pSettings));
    alert('Pengaturan Berhasil Disimpan!');
}

// Muat data saat buka halaman
window.onload = function() {
    document.getElementById('storeLogoInput').value = localStorage.getItem('storeLogo') || '';
    document.getElementById('storeNameInput').value = localStorage.getItem('storeName') || '';
    const ps = JSON.parse(localStorage.getItem('printerSettings') || '{"paperSize":"58"}');
    document.getElementById('paperSizeInput').value = ps.paperSize;
}
</script>
