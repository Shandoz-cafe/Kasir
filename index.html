<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loyverse POS Clone - Cafe Bandung</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <!-- LOADING SCREEN -->
    <div id="loadingScreen" class="loading-screen">
        <div class="logo">
            <img src="img/logo.png" alt="Cafe Bandung">
            <h1>Loyverse POS</h1>
        </div>
        <div class="spinner"></div>
    </div>

    <!-- MAIN APP -->
    <div id="mainApp" class="app-container">
        <!-- HEADER -->
        <header class="header">
            <div class="header-left">
                <span class="material-icons menu-icon" onclick="toggleSidebar()">menu</span>
                <h2>CAFE BANDUNG</h2>
            </div>
            <div class="header-right">
                <span class="user-info" id="userInfo">Loading...</span>
                <span class="material-icons" onclick="logout()">logout</span>
            </div>
        </header>

        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-menu">
                <a href="#" class="menu-item active" data-tab="pos">
                    <span class="material-icons">point_of_sale</span>
                    POS
                </a>
                <a href="#" class="menu-item" data-tab="inventory">
                    <span class="material-icons">inventory</span>
                    Stok
                </a>
                <a href="#" class="menu-item" data-tab="reports">
                    <span class="material-icons">bar_chart</span>
                    Laporan
                </a>
                <a href="#" class="menu-item" data-tab="settings">
                    <span class="material-icons">settings</span>
                    Settings
                </a>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <!-- POS TAB -->
            <div id="pos" class="tab-content active">
                <div class="pos-header">
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-value" id="todaySales">Rp 0</div>
                            <div class="stat-label">Penjualan Hari Ini</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="orderCount">0</div>
                            <div class="stat-label">Order</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="cashRegister">$0</div>
                            <div class="stat-label">Kasir</div>
                        </div>
                    </div>
                </div>

                <div class="pos-body">
                    <div class="left-panel">
                        <!-- PRODUCT SEARCH -->
                        <div class="search-bar">
                            <input type="text" id="productSearch" placeholder="🔍 Cari produk atau scan barcode...">
                            <button onclick="clearCart()">🗑️ New Order</button>
                        </div>

                        <!-- PRODUCT GRID -->
                        <div class="product-grid" id="productGrid">
                            <!-- Products loaded dynamically -->
                        </div>
                    </div>

                    <div class="right-panel">
                        <!-- CART -->
                        <div class="cart-section">
                            <h3>Keranjang <span id="cartItemCount">(0)</span></h3>
                            <div class="cart-items" id="cartItems"></div>
                            <div class="cart-total">
                                <div class="total-row">
                                    <span>Subtotal:</span>
                                    <span id="subtotal">Rp 0</span>
                                </div>
                                <div class="total-row discount">
                                    <span>Diskon:</span>
                                    <input type="number" id="discountInput" min="0" max="100" value="0">%
                                </div>
                                <div class="total-row final">
                                    <span><strong>TOTAL</strong></span>
                                    <span class="final-total" id="finalTotal">Rp 0</span>
                                </div>
                            </div>

                            <!-- PAYMENT -->
                            <div class="payment-section">
                                <div class="payment-row">
                                    <input type="number" id="cashAmount" placeholder="Uang tunai" step="1000">
                                    <button class="btn-pay" onclick="processPayment('cash')">💵 TUNAI</button>
                                </div>
                                <div class="payment-row">
                                    <input type="number" id="cardAmount" placeholder="Kartu/QRIS" step="1000">
                                    <button class="btn-pay" onclick="processPayment('card')">💳 KARTU</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- OTHER TABS (Inventory, Reports, Settings) -->
            <div id="inventory" class="tab-content">
                <h3>📦 Manajemen Stok</h3>
                <!-- Inventory content -->
            </div>

            <div id="reports" class="tab-content">
                <h3>📊 Laporan Penjualan</h3>
                <!-- Reports content -->
            </div>

            <div id="settings" class="tab-content">
                <h3>⚙️ Pengaturan</h3>
                <!-- Settings content -->
            </div>
        </main>
    </div>

    <!-- PRINT MODAL -->
    <div id="printModal" class="modal">
        <div class="modal-content">
            <div id="receiptPreview"></div>
            <div class="modal-actions">
                <button class="btn-print" onclick="printReceipt()">🖨️ Print</button>
                <button class="btn-close" onclick="closePrintModal()">Tutup</button>
            </div>
        </div>
    </div>

    <!-- Firebase + Scripts -->
    <script type="module" src="js/firebase.js"></script>
    <script src="js/printer.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
