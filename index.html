<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kasir Offline - Login</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="login-screen">
    <h2>🔐 Login Kasir</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="loginMsg" style="color:red; margin-top:10px;"></p>

    <h3>🔄 Ganti Password</h3>
    <input type="text" id="chgUser" placeholder="Username">
    <input type="password" id="oldPass" placeholder="Password lama">
    <input type="password" id="newPass" placeholder="Password baru">
    <button onclick="changePassword()">Ganti Password</button>
    <p id="chgMsg" style="color:green; margin-top:10px;"></p>
</div>

<script src="js/auth_offline.js"></script>
</body>
</html>
