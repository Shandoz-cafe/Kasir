<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login - POS System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="display:flex; justify-content:center; align-items:center; height:100vh; background: linear-gradient(135deg, #1e3c72, #2a5298);">
    <div class="card" style="width: 320px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.2);">
        <h2 style="margin-bottom: 25px; color:#1e3c72;">Login Kasir</h2>
        <input type="text" id="loginUser" placeholder="Username">
        <input type="password" id="loginPass" placeholder="Password">
        <button class="primary" style="width: 100%; margin-top: 15px; padding: 12px; font-size: 1.1rem;" onclick="login()">Masuk ke Sistem</button>
    </div>
    <script src="auth.js"></script>
</body>
</html>
