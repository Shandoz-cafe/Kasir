<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS BISNIS FINAL</title>
<style>
body{font-family:Arial;margin:0;background:#f4f6f9}
header{background:#111827;color:white;padding:15px;text-align:center}
.container{padding:15px}
.card{background:white;padding:15px;border-radius:10px;margin-bottom:15px}
input,button{padding:10px;width:100%;margin:5px 0;border-radius:6px;border:1px solid #ccc}
button{background:#2563eb;color:white;border:none}
.product{display:flex;justify-content:space-between;margin:5px 0}
.total{font-weight:bold;font-size:18px;margin-top:10px}
</style>
</head>
<body>

<div id="loginPage" class="container">
<div class="card">
<h2>Login</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>
</div>

<div id="appPage" style="display:none">
<header>POS BISNIS FINAL</header>
<div class="container">

<div class="card">
<h3>Tambah Produk</h3>
<input type="text" id="name" placeholder="Nama Produk">
<input type="number" id="price" placeholder="Harga">
<button onclick="addProduct()">Tambah</button>
</div>

<div class="card">
<h3>Daftar Produk</h3>
<div id="productList"></div>
</div>

<div class="card">
<h3>Keranjang</h3>
<div id="cartList"></div>
<div class="total" id="totalText">TOTAL: Rp0</div>
<button onclick="checkout()">Checkout & Print</button>
</div>

<div class="card" id="dashboardCard">
<h3>Dashboard</h3>
Total Transaksi: <b id="trxCount">0</b><br>
Total Omzet: <b id="trxTotal">0</b>
</div>

<div class="card">
<h3>Riwayat</h3>
<div id="historyList"></div>
</div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAXXt6pg-H09RfkgUhnAlZKMsZU8-9oeqw",
  authDomain: "kasir-10280.firebaseapp.com",
  projectId: "kasir-10280",
  storageBucket: "kasir-10280.firebasestorage.app",
  messagingSenderId: "170037480150",
  appId: "1:170037480150:web:45d084d73d9f9834401777"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let products=[];
let cart=[];

// LOGIN
window.login = async function(){
try{
await signInWithEmailAndPassword(auth,email.value,password.value);

loginPage.style.display="none";
appPage.style.display="block";

const roleDoc = await getDoc(doc(db,"users",email.value));
if(roleDoc.exists()){
if(roleDoc.data().role==="kasir"){
dashboardCard.style.display="none";
}
}

loadHistory();

}catch(e){
alert("Login gagal");
}
}

// PRODUK
window.addProduct=function(){
if(!name.value || !price.value)return;
products.push({n:name.value,p:parseInt(price.value)});
renderProducts();
name.value="";
price.value="";
}

function renderProducts(){
let html="";
products.forEach((x,i)=>{
html+=`
<div class="product">
<span>${x.n} - Rp${x.p}</span>
<button onclick="addToCart(${i})">+</button>
</div>`;
});
productList.innerHTML=html;
}

window.addToCart=function(i){
cart.push(products[i]);
renderCart();
}

function renderCart(){
let total=0;
let html="";
cart.forEach(c=>{
total+=c.p;
html+=`${c.n} - Rp${c.p}<br>`;
});
cartList.innerHTML=html;
totalText.innerText="TOTAL: Rp"+total;
}

// CHECKOUT
window.checkout=async function(){
if(cart.length===0)return;
let total=cart.reduce((a,b)=>a+b.p,0);

await addDoc(collection(db,"transaksi"),{
tanggal:new Date(),
total:total
});

printStruk(total);

cart=[];
renderCart();
loadHistory();
}

// PRINT
function printStruk(total){
let content="<center><b>TOKO ANDA</b></center><hr>";
cart.forEach(c=>{
content+=`${c.n} - Rp${c.p}<br>`;
});
content+="<hr>TOTAL: Rp"+total;

let win=window.open("","","width=300,height=600");
win.document.write(content);
win.print();
win.close();
}

// LOAD HISTORY
async function loadHistory(){
const snapshot=await getDocs(collection(db,"transaksi"));
let count=0;
let omzet=0;
let html="";
snapshot.forEach(doc=>{
let d=doc.data();
count++;
omzet+=d.total;
html+=`${new Date(d.tanggal.seconds*1000).toLocaleString()} - Rp${d.total}<br>`;
});
historyList.innerHTML=html;
trxCount.innerText=count;
trxTotal.innerText="Rp"+omzet;
}

</script>

</body>
</html>
