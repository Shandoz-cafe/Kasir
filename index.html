<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Shandoz POS Enterprise</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { 
            /* Latar belakang mewah ala corporate tech */
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); 
            height: 100vh; display: flex; justify-content: center; align-items: center; 
            color: #fff; overflow: hidden;
        }
        
        /* Efek Kaca (Glassmorphism) */
        .login-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            transition: transform 0.3s;
        }
        
        .logo-area { margin-bottom: 30px; }
        .logo-icon { font-size: 50px; margin-bottom: 10px; display: inline-block; background: -webkit-linear-gradient(#3b82f6, #2ecc71); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo-text { font-size: 24px; font-weight: 800; letter-spacing: 2px; }
        .logo-sub { font-size: 11px; color: #aaa; letter-spacing: 4px; margin-top: -5px; margin-bottom: 20px;}

        input { width: 100%; padding: 15px; margin-bottom: 15px; border: none; border-radius: 10px; background: rgba(255, 255, 255, 0.1); color: #fff; font-size: 14px; outline: none; transition: 0.3s; }
        input::placeholder { color: rgba(255, 255, 255, 0.5); }
        input:focus { background: rgba(255, 255, 255, 0.2); box-shadow: 0 0 0 2px #3b82f6; }

        button { width: 100%; padding: 15px; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-login { background: #3b82f6; color: #fff; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); margin-bottom: 15px; }
        .btn-login:active { transform: scale(0.95); }

        .divider { display: flex; align-items: center; margin: 20px 0; color: #aaa; font-size: 12px; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid rgba(255,255,255,0.2); }
        .divider:not(:empty)::before { margin-right: 15px; }
        .divider:not(:empty)::after { margin-left: 15px; }

        .btn-google { background: #fff; color: #333; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); margin-bottom: 15px;}
        .btn-google img { width: 20px; }
        .btn-google:active { transform: scale(0.95); background: #eee; }

        .toggle-form { font-size: 12px; color: #ccc; cursor: pointer; margin-top: 10px; }
        .toggle-form span { color: #3b82f6; font-weight: 600; }
        
        /* Loading Overlay */
        #loader { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:999; justify-content:center; align-items:center; color:white; font-weight:bold; }
    </style>
</head>
<body>

    <div id="loader">Memproses Autentikasi...</div>

    <div class="login-box">
        <div class="logo-area">
            <div class="logo-icon">💠</div>
            <div class="logo-text">SHANDOZ POS</div>
            <div class="logo-sub">ENTERPRISE EDITION</div>
        </div>

        <div id="loginForm">
            <input type="email" id="loginEmail" placeholder="Alamat Email">
            <input type="password" id="loginPass" placeholder="Kata Sandi">
            <button class="btn-login" onclick="loginWithEmail()">MASUK</button>
            
            <div class="divider">ATAU</div>
            
            <button class="btn-google" onclick="loginWithGoogle()">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google">
                Lanjutkan dengan Google
            </button>
            
            <div class="toggle-form" onclick="toggleView('register')">Belum punya akun? <span>Daftar Gratis</span></div>
        </div>

        <div id="registerForm" style="display: none;">
            <input type="text" id="regName" placeholder="Nama Lengkap / Nama Kafe">
            <input type="email" id="regEmail" placeholder="Alamat Email Valid">
            <input type="password" id="regPass" placeholder="Buat Kata Sandi (Min. 6 Karakter)">
            <button class="btn-login" style="background:#2ecc71; box-shadow: 0 4px 15px rgba(46, 204, 113, 0.4);" onclick="registerWithEmail()">BUAT AKUN</button>
            <div class="toggle-form" onclick="toggleView('login')">Sudah punya akun? <span>Masuk di sini</span></div>
        </div>

        <div style="margin-top: 30px; font-size: 10px; color: rgba(255,255,255,0.3);">
            &copy; 2026 SHANDOZ SYSTEMS LTD.
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <script src="auth.js"></script>
    <script>
        function toggleView(view) {
            document.getElementById('loginForm').style.display = view === 'login' ? 'block' : 'none';
            document.getElementById('registerForm').style.display = view === 'register' ? 'block' : 'none';
        }
    </script>
</body>
</html>
