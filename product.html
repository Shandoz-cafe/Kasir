<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kelola Produk - VIREXON</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>
<body>
    <header>
        <h2 data-i18n="inv_title">📦 Gudang & Produk</h2>
        <button class="bg-warning btn-head" onclick="window.location.href='dashboard.html'" data-i18n="btn_back_dash">⬅️ Dashboard</button>
    </header>
    
    <div class="container">
        <div class="card" style="margin-bottom: 20px;">
            <h3 style="margin-top:0; margin-bottom: 15px; color: #1e293b;" data-i18n="inv_add_title">Tambah Produk Baru</h3>
            <div style="display: flex; gap: 10px; flex-wrap: wrap; align-items: center;">
                <input type="text" id="prodName" placeholder="Nama Produk" data-i18n-ph="inv_ph_name" style="flex:2; min-width:150px; margin:0;">
                <input type="text" id="prodCategory" placeholder="Kategori" data-i18n-ph="inv_ph_category" style="flex:1; min-width:120px; margin:0;">
                
                <div style="display:flex; flex:2; min-width:200px; gap:5px;">
                    <input type="text" id="prodBarcode" placeholder="Kode Barcode" data-i18n-ph="inv_ph_barcode" style="width:100%; margin:0;">
                    <button class="bg-warning" style="margin:0; white-space:nowrap; border-radius: 8px; color: white;" onclick="openScanner()" data-i18n="inv_btn_scan">📷 Scan</button>
                </div>
                
                <input type="number" id="prodCost" placeholder="Modal (HPP)" data-i18n-ph="inv_ph_cost" style="flex:1; min-width:100px; margin:0;">
                <input type="number" id="prodPrice" placeholder="Harga Jual" data-i18n-ph="inv_ph_price" style="flex:1; min-width:100px; margin:0;">
                <input type="number" id="prodStock" placeholder="Stok" data-i18n-ph="inv_ph_stock" style="flex:1; min-width:70px; margin:0;">
                <button class="bg-primary" style="white-space: nowrap; margin:0; color: white;" onclick="addProduct()" data-i18n="inv_btn_save">➕ Simpan</button>
            </div>
        </div>

        <div style="display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap;">
            <input type="text" id="searchItemInput" data-i18n-ph="inv_search_ph" placeholder="🔍 Cari nama item..." style="flex: 2; margin: 0; min-width: 150px;" oninput="loadProducts()">
            <select id="filterCatDropdown" style="flex: 1; margin: 0; min-width: 130px;" onchange="loadProducts()">
                <option value="ALL" data-i18n="inv_filter_all">Semua Kategori</option>
            </select>
        </div>
        
        <div class="card" style="overflow-x: auto; padding: 0;">
            <table style="width: 100%; border-collapse: collapse; text-align: left; font-size: 13px;">
                <thead style="background: #f8fafc; border-bottom: 2px solid #e2e8f0; color: #475569;">
                    <tr>
                        <th style="padding: 15px;" data-i18n="inv_th_no">No</th>
                        <th data-i18n="inv_th_barcode">Barcode</th>
                        <th data-i18n="inv_th_category">Kategori</th>
                        <th data-i18n="inv_th_name">Nama Item</th>
                        <th data-i18n="inv_th_cost">Modal</th>
                        <th data-i18n="inv_th_price">Jual</th>
                        <th data-i18n="inv_th_stock">Sisa Stok</th>
                        <th data-i18n="inv_th_action">Aksi</th>
                    </tr>
                </thead>
                <tbody id="productList"></tbody>
            </table>
        </div>
    </div>

    <div class="modal-overlay" id="scannerModal">
        <div class="modal-box">
            <h3 style="margin-top: 0; color: #0f172a;" data-i18n="inv_scan_title">Arahkan Kamera ke Barcode</h3>
            <div id="reader" style="width: 100%; max-width: 400px; margin: auto;"></div>
            <button class="bg-danger" style="width: 100%; margin-top: 15px; padding: 12px; color: white;" onclick="closeScanner()" data-i18n="inv_btn_cancel">Batal</button>
        </div>
    </div>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="auth.js"></script>
    <script src="lang.js"></script>
    
    <script>
        checkAuth(); 
        
        window.onload = function() {
            const role = localStorage.getItem('currentRole') || 'cashier';
            if(role !== 'admin') {
                document.querySelectorAll('.card')[0].style.display = 'none';
            }
        }
    </script>
    
    <script src="product.js"></script>
</body>
</html>
